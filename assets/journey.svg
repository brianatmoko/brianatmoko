<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Courier New', monospace">
  <!-- ===== BACKGROUND BANDS (flat pixel colors) ===== -->
  <rect x="0" y="0"   width="800" height="240" fill="#1C1C28"/>  <!-- angkasa / night -->
  <rect x="0" y="240" width="800" height="40"  fill="#2E4A6E"/>  <!-- transisi -->
  <rect x="0" y="280" width="800" height="160" fill="#88CCEA"/>  <!-- atmosfer siang -->
  <rect x="0" y="440" width="800" height="80"  fill="#A8D8EF"/>  <!-- atmosfer bawah -->
  <rect x="0" y="520" width="800" height="16"  fill="#5FB34A"/>  <!-- rumput -->
  <rect x="0" y="536" width="800" height="64"  fill="#8B5A2B"/>  <!-- tanah -->

  <!-- ===== ANGKASA: bintang blocky (ukuran bervariasi) ===== -->
  <g fill="#FFFFFF">
    <!-- size 2 -->
    <rect x="40" y="40" width="2" height="2"/><rect x="90" y="70" width="2" height="2"/>
    <rect x="150" y="30" width="2" height="2"/><rect x="210" y="90" width="2" height="2"/>
    <rect x="280" y="50" width="2" height="2"/><rect x="500" y="70" width="2" height="2"/>
    <rect x="560" y="30" width="2" height="2"/><rect x="620" y="90" width="2" height="2"/>
    <rect x="720" y="60" width="2" height="2"/><rect x="770" y="110" width="2" height="2"/>
    <rect x="60" y="140" width="2" height="2"/><rect x="130" y="170" width="2" height="2"/>
    <rect x="200" y="130" width="2" height="2"/><rect x="270" y="180" width="2" height="2"/>
    <rect x="340" y="150" width="2" height="2"/><rect x="490" y="170" width="2" height="2"/>
    <rect x="560" y="140" width="2" height="2"/><rect x="640" y="160" width="2" height="2"/>
    <rect x="710" y="130" width="2" height="2"/><rect x="760" y="190" width="2" height="2"/>
    <rect x="100" y="200" width="2" height="2"/><rect x="600" y="210" width="2" height="2"/>
    <rect x="160" y="110" width="2" height="2"/><rect x="240" y="60" width="2" height="2"/>
    <rect x="460" y="100" width="2" height="2"/><rect x="520" y="150" width="2" height="2"/>
    <!-- size 3 (lebih terang) -->
    <rect x="120" y="50" width="3" height="3"/><rect x="330" y="100" width="3" height="3"/>
    <rect x="540" y="90" width="3" height="3"/><rect x="680" y="150" width="3" height="3"/>
    <rect x="740" y="80" width="3" height="3"/>
    <!-- size 4 (terbesar) -->
    <rect x="300" y="160" width="4" height="4"/><rect x="500" y="40" width="4" height="4"/>
    <rect x="620" y="200" width="4" height="4"/>
  </g>

  <!-- shooting stars (blocky trails) -->
  <g fill="#FFFFFF">
    <rect x="700" y="200" width="6" height="6"/><rect x="692" y="192" width="4" height="4"/><rect x="686" y="186" width="3" height="3"/><rect x="681" y="181" width="2" height="2"/>
    <rect x="150" y="220" width="6" height="6"/><rect x="142" y="212" width="4" height="4"/><rect x="136" y="206" width="3" height="3"/>
  </g>

  <!-- blocky Earth-planet (kiri atas) -->
  <rect x="46" y="46" width="88" height="88" fill="#3FA9D6" opacity="0.35"/>
  <rect x="54" y="54" width="72" height="72" fill="#2E6FB0"/>
  <rect x="62" y="66" width="24" height="16" fill="#4A8B3A"/>
  <rect x="90" y="86" width="22" height="20" fill="#4A8B3A"/>
  <rect x="66" y="98" width="18" height="14" fill="#4A8B3A"/>
  <rect x="78" y="54" width="16" height="8"  fill="#D8E8F0"/>
  <rect x="104" y="62" width="22" height="64" fill="#1E4A78" opacity="0.6"/>

  <!-- blocky moon (kanan atas) -->
  <rect x="668" y="28" width="52" height="52" fill="#D9D9D9"/>
  <rect x="680" y="40" width="12" height="12" fill="#B0B0B0"/>
  <rect x="702" y="58" width="12" height="12" fill="#B0B0B0"/>
  <rect x="690" y="66" width="8"  height="8"  fill="#C2C2C2"/>

  <!-- blocky Steve astronaut (turun dari angkasa, elytra) -->
  <g>
    <!-- elytra wings -->
    <rect x="360" y="172" width="18" height="10" fill="#C9CFD8"/><rect x="354" y="182" width="24" height="6" fill="#9AA7B5"/>
    <rect x="426" y="172" width="18" height="10" fill="#C9CFD8"/><rect x="426" y="182" width="24" height="6" fill="#9AA7B5"/>
    <!-- jetpack -->
    <rect x="386" y="176" width="12" height="22" fill="#9AA7B5"/>
    <!-- head -->
    <rect x="396" y="150" width="32" height="8"  fill="#5E3C1B"/>
    <rect x="396" y="158" width="32" height="16" fill="#E0B080"/>
    <rect x="402" y="160" width="20" height="10" fill="#1FB6D8"/>
    <!-- torso -->
    <rect x="398" y="174" width="28" height="24" fill="#F2F4F7"/>
    <rect x="404" y="178" width="16" height="10" fill="#2E8FB8"/>
    <!-- arms -->
    <rect x="386" y="178" width="10" height="20" fill="#E6E9EE"/><rect x="386" y="194" width="10" height="4" fill="#2E8FB8"/>
    <rect x="424" y="178" width="10" height="20" fill="#E6E9EE"/><rect x="424" y="194" width="10" height="4" fill="#2E8FB8"/>
    <!-- hand holding dirt block -->
    <rect x="382" y="198" width="12" height="12" fill="#8B5A2B"/><rect x="382" y="198" width="12" height="4" fill="#5FB34A"/>
    <!-- legs -->
    <rect x="398" y="198" width="12" height="16" fill="#E6E9EE"/><rect x="398" y="210" width="12" height="4" fill="#2E8FB8"/>
    <rect x="414" y="198" width="12" height="16" fill="#E6E9EE"/><rect x="414" y="210" width="12" height="4" fill="#2E8FB8"/>
  </g>

  <!-- ===== ATMOSFER ===== -->
  <rect x="120" y="300" width="48" height="48" fill="#FCD34D"/><rect x="132" y="312" width="24" height="24" fill="#FFE9A0"/>
  <g fill="#FFFFFF">
    <rect x="80"  y="300" width="16" height="16"/><rect x="96"  y="300" width="16" height="16"/><rect x="80" y="316" width="16" height="16"/>
    <rect x="220" y="330" width="16" height="16"/><rect x="236" y="330" width="16" height="16"/>
    <rect x="360" y="308" width="16" height="16"/><rect x="376" y="308" width="16" height="16"/>
    <rect x="520" y="320" width="16" height="16"/><rect x="536" y="320" width="16" height="16"/>
    <rect x="620" y="300" width="16" height="16"/><rect x="636" y="300" width="16" height="16"/>
  </g>

  <!-- sign: ABOUT ME -->
  <rect x="316" y="546" width="168" height="46" fill="#8B5A2B" stroke="#5E3C1B" stroke-width="4"/>
  <text x="400" y="576" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2E2BC" letter-spacing="2">ABOUT ME</text>

  <!-- pixel border frame -->
  <rect x="2" y="2" width="796" height="596" fill="none" stroke="#5A5A5A" stroke-width="4"/>
  <rect x="6" y="6" width="788" height="588" fill="none" stroke="#8A8A8A" stroke-width="2" opacity="0.7"/>
</svg>
