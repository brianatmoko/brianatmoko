<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1010" viewBox="0 0 800 1010" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0B0820"/>
      <stop offset="26%" stop-color="#142850"/>
      <stop offset="42%" stop-color="#3A6EA5"/>
      <stop offset="50%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#4A78B0"/>
      <stop offset="72%" stop-color="#1E2466"/>
      <stop offset="100%" stop-color="#0D0A2E"/>
    </linearGradient>
    <radialGradient id="moon" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#F5F3E6"/>
      <stop offset="100%" stop-color="#B9B597"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#7FD8E8"/>
      <stop offset="55%" stop-color="#2E8FB8"/>
      <stop offset="100%" stop-color="#163B55"/>
    </radialGradient>
    <radialGradient id="sunglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6D6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF6D6" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card"><rect x="2" y="2" width="796" height="1006" rx="18" ry="18"/></clipPath>
    <clipPath id="avatarClip"><circle cx="400" cy="668" r="50"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect x="2" y="2" width="796" height="1006" fill="url(#sky)"/>

    <!-- STARS -->
    <g fill="#FFFFFF">
      <circle cx="60"  cy="40"  r="1.6"/><circle cx="140" cy="80"  r="1.1"/>
      <circle cx="220" cy="34"  r="1.8"/><circle cx="300" cy="90"  r="1.2"/>
      <circle cx="380" cy="46"  r="1.5"/><circle cx="470" cy="30"  r="1.1"/>
      <circle cx="540" cy="84"  r="1.7"/><circle cx="620" cy="50"  r="1.2"/>
      <circle cx="700" cy="96"  r="1.6"/><circle cx="760" cy="40"  r="1.0"/>
      <circle cx="100" cy="150" r="1.3"/><circle cx="260" cy="160" r="1.0"/>
      <circle cx="420" cy="140" r="1.4"/><circle cx="560" cy="170" r="1.1"/>
      <circle cx="690" cy="150" r="1.5"/><circle cx="740" cy="200" r="1.0"/>
      <circle cx="40"  cy="230" r="1.2"/><circle cx="180" cy="250" r="1.6"/>
      <circle cx="330" cy="230" r="1.1"/><circle cx="500" cy="250" r="1.4"/>
      <circle cx="640" cy="240" r="1.2"/><circle cx="760" cy="280" r="1.3"/>
      <circle cx="120" cy="300" r="1.0"/><circle cx="400" cy="310" r="1.2"/>
      <circle cx="600" cy="320" r="1.1"/>
    </g>

    <!-- SUN GLOW -->
    <circle cx="400" cy="470" r="160" fill="url(#sunglow)"/>

    <!-- MOON -->
    <circle cx="660" cy="120" r="46" fill="url(#moon)"/>
    <circle cx="648" cy="108" r="7" fill="#A8A484" opacity="0.6"/>
    <circle cx="672" cy="132" r="5" fill="#A8A484" opacity="0.5"/>
    <circle cx="660" cy="140" r="4" fill="#A8A484" opacity="0.4"/>

    <!-- PLANET -->
    <ellipse cx="150" cy="210" rx="70" ry="70" fill="url(#planet)"/>
    <ellipse cx="150" cy="210" rx="100" ry="22" fill="none" stroke="#7FD8E8" stroke-width="3" opacity="0.7" transform="rotate(-18 150 210)"/>
    <ellipse cx="150" cy="210" rx="118" ry="30" fill="none" stroke="#7FD8E8" stroke-width="2" opacity="0.4" transform="rotate(-18 150 210)"/>

    <!-- ASTRONAUT -->
    <g transform="translate(330,150)">
      <rect x="-14" y="10" width="22" height="40" rx="4" fill="#9AA7B5"/>
      <rect x="2" y="14" width="40" height="46" rx="8" fill="#F2F4F7"/>
      <rect x="10" y="24" width="24" height="16" rx="3" fill="#2E8FB8"/>
      <rect x="-6" y="18" width="12" height="34" rx="6" fill="#E6E9EE"/>
      <rect x="44" y="20" width="12" height="34" rx="6" fill="#E6E9EE"/>
      <circle cx="-2" cy="54" r="6" fill="#F2F4F7" stroke="#C9CFD8"/>
      <rect x="6" y="-20" width="32" height="36" rx="12" fill="#F2F4F7"/>
      <rect x="11" y="-15" width="22" height="24" rx="9" fill="#1B2A52"/>
      <rect x="14" y="-12" width="9" height="9" rx="4" fill="#7FD8E8" opacity="0.8"/>
      <rect x="6"  y="58" width="14" height="22" rx="5" fill="#E6E9EE"/>
      <rect x="28" y="58" width="14" height="22" rx="5" fill="#E6E9EE"/>
      <rect x="4"  y="78" width="18" height="8" rx="3" fill="#9AA7B5"/>
      <rect x="26" y="78" width="18" height="8" rx="3" fill="#9AA7B5"/>
    </g>
    <!-- BALLOON -->
    <line x1="328" y1="204" x2="300" y2="120" stroke="#C9CFD8" stroke-width="1.5"/>
    <ellipse cx="296" cy="108" rx="20" ry="24" fill="#00D2FF" opacity="0.85"/>
    <ellipse cx="290" cy="100" rx="6" ry="8" fill="#FFFFFF" opacity="0.5"/>

    <!-- CLOUDS -->
    <g fill="#FFFFFF" opacity="0.85">
      <ellipse cx="120" cy="500" rx="90" ry="26"/><ellipse cx="180" cy="510" rx="70" ry="22"/>
      <ellipse cx="640" cy="520" rx="100" ry="28"/><ellipse cx="560" cy="510" rx="60" ry="20"/>
      <ellipse cx="400" cy="545" rx="120" ry="24" opacity="0.6"/>
    </g>

    <!-- ===== ABOUT ME PANEL (dark, styled, with background) ===== -->
    <rect x="2" y="560" width="796" height="448" fill="#0D0A2E"/>
    <line x1="40" y1="600" x2="760" y2="600" stroke="#00D2FF" stroke-width="2" opacity="0.8"/>
    <text x="400" y="592" text-anchor="middle" font-size="20" font-weight="bold" fill="#00D2FF" letter-spacing="4">ABOUT ME</text>

    <!-- avatar fallback ring -->
    <circle cx="400" cy="668" r="54" fill="none" stroke="#00D2FF" stroke-width="3"/>
    <circle cx="400" cy="668" r="50" fill="#1E2466"/>
    <!-- LIVE avatar (GitHub-hosted; falls back to ring above if blocked) -->
    <image href="https://github.com/brianatmoko.png" x="350" y="618" width="100" height="100" clip-path="url(#avatarClip)"/>

    <text x="400" y="752" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF">BRIAN ATMOKO</text>
    <text x="400" y="776" text-anchor="middle" font-size="12" fill="#00D2FF" letter-spacing="2">EMBEDDED &amp; FULLSTACK ENGINEER</text>

    <!-- TENTANG SAYA -->
    <text x="60" y="812" font-size="13" font-weight="bold" fill="#00D2FF">▌ TENTANG SAYA</text>
    <text x="60" y="832" font-size="11" fill="#B0C8E0">Merancang sistem embedded, firmware, dan perangkat lunak.</text>
    <text x="60" y="848" font-size="11" fill="#B0C8E0">Dari sensor hingga cloud, dari PCB hingga dashboard.</text>
    <text x="60" y="864" font-size="11" fill="#B0C8E0">Lebih dari 8 tahun membangun di setiap lapisan teknologi.</text>

    <!-- SPESIALISASI -->
    <text x="60" y="892" font-size="13" font-weight="bold" fill="#87CEEB">▌ SPESIALISASI</text>
    <text x="60" y="910" font-size="11" fill="#A0C0E0">• Drone Systems   • Digital ECU   • Elektronika   • Software</text>

    <!-- BAHASA FAVORIT pills -->
    <text x="430" y="892" font-size="13" font-weight="bold" fill="#87CEEB">▌ BAHASA</text>
    <rect x="430" y="900" width="58" height="20" rx="10" fill="#00599C"/><text x="459" y="914" text-anchor="middle" font-size="10" fill="#FFFFFF">C++</text>
    <rect x="496" y="900" width="58" height="20" rx="10" fill="#ED8B00"/><text x="525" y="914" text-anchor="middle" font-size="10" fill="#FFFFFF">Java</text>
    <rect x="562" y="900" width="68" height="20" rx="10" fill="#3776AB"/><text x="596" y="914" text-anchor="middle" font-size="10" fill="#FFFFFF">Python</text>

    <!-- STACK pills -->
    <text x="430" y="936" font-size="13" font-weight="bold" fill="#87CEEB">▌ STACK</text>
    <rect x="430" y="944" width="70" height="20" rx="10" fill="#03234B"/><text x="465" y="958" text-anchor="middle" font-size="9" fill="#FFFFFF">STM32</text>
    <rect x="508" y="944" width="78" height="20" rx="10" fill="#00979D"/><text x="547" y="958" text-anchor="middle" font-size="9" fill="#FFFFFF">Arduino</text>
    <rect x="594" y="944" width="92" height="20" rx="10" fill="#C51A4A"/><text x="640" y="958" text-anchor="middle" font-size="9" fill="#FFFFFF">Raspberry Pi</text>
    <rect x="430" y="970" width="58" height="20" rx="10" fill="#41CD52"/><text x="459" y="984" text-anchor="middle" font-size="9" fill="#FFFFFF">Qt</text>
    <rect x="496" y="970" width="92" height="20" rx="10" fill="#FF6F00"/><text x="542" y="984" text-anchor="middle" font-size="9" fill="#FFFFFF">TensorFlow</text>
  </g>

  <rect x="2" y="2" width="796" height="1006" rx="18" ry="18" fill="none" stroke="#00D2FF" stroke-width="2" opacity="0.8"/>
</svg>
