<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Courier New', monospace">
  <!-- ===== BACKGROUND BANDS (flat pixel colors, no gradients) ===== -->
  <rect x="0" y="0"   width="800" height="240" fill="#1C1C28"/>  <!-- angkasa / night -->
  <rect x="0" y="240" width="800" height="40"  fill="#2E4A6E"/>  <!-- transisi -->
  <rect x="0" y="280" width="800" height="160" fill="#88CCEA"/>  <!-- atmosfer siang -->
  <rect x="0" y="440" width="800" height="80"  fill="#A8D8EF"/>  <!-- atmosfer bawah -->
  <rect x="0" y="520" width="800" height="16"  fill="#5FB34A"/>  <!-- rumput -->
  <rect x="0" y="536" width="800" height="64"  fill="#8B5A2B"/>  <!-- tanah -->

  <!-- stars (2x2 blocky) -->
  <g fill="#FFFFFF">
    <rect x="40" y="40" width="3" height="3"/><rect x="90" y="70" width="3" height="3"/>
    <rect x="150" y="30" width="3" height="3"/><rect x="210" y="90" width="3" height="3"/>
    <rect x="280" y="50" width="3" height="3"/><rect x="350" y="80" width="3" height="3"/>
    <rect x="430" y="40" width="3" height="3"/><rect x="500" y="70" width="3" height="3"/>
    <rect x="560" y="30" width="3" height="3"/><rect x="620" y="90" width="3" height="3"/>
    <rect x="720" y="60" width="3" height="3"/><rect x="770" y="110" width="3" height="3"/>
    <rect x="60" y="140" width="3" height="3"/><rect x="130" y="170" width="3" height="3"/>
    <rect x="200" y="130" width="3" height="3"/><rect x="270" y="180" width="3" height="3"/>
    <rect x="340" y="150" width="3" height="3"/><rect x="420" y="120" width="3" height="3"/>
    <rect x="490" y="170" width="3" height="3"/><rect x="560" y="140" width="3" height="3"/>
    <rect x="640" y="160" width="3" height="3"/><rect x="710" y="130" width="3" height="3"/>
    <rect x="760" y="190" width="3" height="3"/><rect x="100" y="200" width="3" height="3"/>
    <rect x="380" y="210" width="3" height="3"/><rect x="600" y="210" width="3" height="3"/>
  </g>

  <!-- moon (blocky) -->
  <g>
    <rect x="668" y="28" width="48" height="48" fill="#D9D9D9"/>
    <rect x="680" y="40" width="10" height="10" fill="#B0B0B0"/>
    <rect x="700" y="58" width="10" height="10" fill="#B0B0B0"/>
    <rect x="690" y="64" width="8" height="8" fill="#C2C2C2"/>
  </g>

  <!-- sun (blocky) -->
  <g>
    <rect x="120" y="300" width="48" height="48" fill="#FCD34D"/>
    <rect x="132" y="312" width="24" height="24" fill="#FFE9A0"/>
  </g>

  <!-- clouds (blocky white) -->
  <g fill="#FFFFFF">
    <rect x="80"  y="300" width="16" height="16"/><rect x="96"  y="300" width="16" height="16"/><rect x="80" y="316" width="16" height="16"/>
    <rect x="220" y="330" width="16" height="16"/><rect x="236" y="330" width="16" height="16"/>
    <rect x="360" y="308" width="16" height="16"/><rect x="376" y="308" width="16" height="16"/>
    <rect x="520" y="320" width="16" height="16"/><rect x="536" y="320" width="16" height="16"/>
    <rect x="620" y="300" width="16" height="16"/><rect x="636" y="300" width="16" height="16"/>
  </g>

  <!-- astronaut (blocky Steve-in-suit) descending -->
  <g>
    <rect x="380" y="264" width="14" height="30" fill="#9AA7B5"/>           <!-- backpack -->
    <rect x="394" y="232" width="42" height="32" fill="#F2F4F7"/>           <!-- helmet -->
    <rect x="402" y="240" width="26" height="16" fill="#1FB6D8"/>           <!-- visor -->
    <rect x="398" y="266" width="34" height="28" fill="#2E8FB8"/>           <!-- body -->
    <rect x="380" y="270" width="14" height="24" fill="#E6E9EE"/>           <!-- arm L -->
    <rect x="430" y="270" width="14" height="24" fill="#E6E9EE"/>           <!-- arm R -->
    <rect x="398" y="294" width="14" height="16" fill="#E6E9EE"/>           <!-- leg L -->
    <rect x="416" y="294" width="14" height="16" fill="#E6E9EE"/>           <!-- leg R -->
    <rect x="392" y="226" width="46" height="6"  fill="#C9CFD8"/>           <!-- helmet rim -->
  </g>

  <!-- sign: ABOUT ME (wooden plank) -->
  <rect x="316" y="546" width="168" height="46" fill="#8B5A2B" stroke="#5E3C1B" stroke-width="4"/>
  <text x="400" y="576" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2E2BC" letter-spacing="2">ABOUT ME</text>

  <!-- pixel border frame -->
  <rect x="2" y="2" width="796" height="596" fill="none" stroke="#5A5A5A" stroke-width="4"/>
  <rect x="6" y="6" width="788" height="588" fill="none" stroke="#8A8A8A" stroke-width="2" opacity="0.7"/>
</svg>
