<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0B0820"/>
      <stop offset="30%" stop-color="#142850"/>
      <stop offset="50%" stop-color="#87CEEB"/>
      <stop offset="66%" stop-color="#4A78B0"/>
      <stop offset="100%" stop-color="#0D0A2E"/>
    </linearGradient>
    <radialGradient id="moon" cx="38%" cy="35%" r="70%">
