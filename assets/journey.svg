<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Courier New', monospace">
  <!-- ===== ANGKASA / VOID (End-inspired, 3 band) ===== -->
  <rect x="0" y="0"   width="800" height="80"  fill="#0B0720"/>
  <rect x="0" y="80"  width="800" height="100" fill="#1A1030"/>
  <rect x="0" y="180" width="800" height="60"  fill="#2E184A"/>
  <rect x="0" y="240" width="800" height="40"  fill="#2E4A6E"/>   <!-- transisi ke atmosfer -->

  <!-- ===== PLANET JAUH (kiri atas) ===== -->
  <rect x="16" y="16" width="38" height="38" fill="#3FA9D6" opacity="0.35"/>
  <rect x="22" y="22" width="28" height="28" fill="#2E6FB0"/>
  <rect x="28" y="28" width="8"  height="10" fill="#4A8B3A"/><rect x="40" y="36" width="6" height="8" fill="#4A8B3A"/>

  <!-- ===== BULAN BESAR (kanan atas) ===== -->
  <rect x="660" y="20" width="80" height="80" fill="#D9D9D9" opacity="0.12"/>
  <rect x="666" y="28" width="56" height="56" fill="#D9D9D9"/>
  <rect x="678" y="40" width="12" height="12" fill="#B0B0B0"/>
  <rect x="704" y="56" width="12" height="12" fill="#B0B0B0"/>
  <rect x="692" y="64" width="8"  height="8"  fill="#C2C2C2"/>
  <rect x="668" y="44" width="14" height="16" fill="#B8B8B8"/>

  <!-- ===== GLOWSTONE / BINTANG BESAR ===== -->
  <g fill="#FFFF8A">
    <rect x="80"  y="30"  width="6" height="6"/><rect x="82"  y="32"  width="4" height="4" fill="#FFFFFF"/>
    <rect x="320" y="20"  width="8" height="8"/><rect x="322" y="22"  width="4" height="4" fill="#FFFFFF"/>
    <rect x="560" y="40"  width="6" height="6"/><rect x="652" y="80"  width="6" height="6"/>
    <rect x="760" y="50"  width="6" height="6"/><rect x="240" y="100" width="6" height="6"/>
  </g>

  <!-- ===== BINTANG KECIL (2x2) ===== -->
  <g fill="#FFFFFF">
    <rect x="40"  y="50"  width="2" height="2"/><rect x="120" y="70"  width="2" height="2"/>
    <rect x="160" y="30"  width="2" height="2"/><rect x="200" y="80"  width="2" height="2"/>
    <rect x="280" y="50"  width="2" height="2"/><rect x="360" y="70"  width="2" height="2"/>
    <rect x="440" y="30"  width="2" height="2"/><rect x="520" y="80"  width="2" height="2"/>
    <rect x="600" y="50"  width="2" height="2"/><rect x="720" y="90"  width="2" height="2"/>
    <rect x="140" y="120" width="2" height="2"/><rect x="220" y="150" width="2" height="2"/>
    <rect x="300" y="130" width="2" height="2"/><rect x="400" y="120" width="2" height="2"/>
    <rect x="480" y="150" width="2" height="2"/><rect x="580" y="130" width="2" height="2"/>
    <rect x="680" y="140" width="2" height="2"/><rect x="760" y="170" width="2" height="2"/>
    <rect x="80"  y="190" width="2" height="2"/><rect x="340" y="190" width="2" height="2"/>
    <rect x="640" y="190" width="2" height="2"/>
  </g>

  <!-- ===== END PARTIKEL (purple) ===== -->
  <g fill="#B84BFF">
    <rect x="170" y="80"  width="3" height="3"/><rect x="260" y="120" width="3" height="3"/>
    <rect x="500" y="80"  width="3" height="3"/><rect x="600" y="60"  width="3" height="3"/>
    <rect x="280" y="180" width="3" height="3"/><rect x="540" y="140" width="3" height="3"/>
    <rect x="420" y="190" width="3" height="3"/><rect x="700" y="110" width="3" height="3"/>
  </g>

  <!-- ===== KOMET (shooting star) ===== -->
  <g fill="#FFFFFF">
    <rect x="720" y="20" width="6" height="6"/>
    <rect x="706" y="34" width="4" height="4"/>
    <rect x="696" y="44" width="3" height="3"/>
    <rect x="690" y="50" width="2" height="2"/>
  </g>

  <!-- ===== PULAU END MELAYANG (kiri) ===== -->
  <g>
    <rect x="40"  y="140" width="160" height="40" fill="#E8E8D0"/>
    <rect x="50"  y="120" width="140" height="20" fill="#DFDCC0"/>
    <rect x="60"  y="180" width="4"  height="20" fill="#4A8B3A"/>
    <rect x="120" y="180" width="4"  height="20" fill="#4A8B3A"/>
    <!-- chorus plant -->
    <rect x="120" y="60"  width="6"  height="60" fill="#B84BFF"/>
    <rect x="112" y="60"  width="22" height="6"  fill="#B84BFF"/>
    <rect x="108" y="68"  width="12" height="6"  fill="#B84BFF"/>
    <rect x="130" y="80"  width="10" height="6"  fill="#B84BFF"/>
    <!-- end crystal -->
    <rect x="116" y="40"  width="12" height="20" fill="#FFFFFF"/>
    <rect x="120" y="30"  width="4"  height="10" fill="#FF6F00"/>
    <rect x="114" y="46"  width="16" height="4"  fill="#FCD34D"/>
    <rect x="116" y="0"   width="8"  height="30" fill="#FFFFFF" opacity="0.15"/>
  </g>

  <!-- ===== PORTAL NETHER (latar) ===== -->
  <g>
    <rect x="234" y="60"  width="8"  height="36" fill="#2A1A12"/>
    <rect x="234" y="60"  width="44" height="8"  fill="#2A1A12"/>
    <rect x="270" y="60"  width="8"  height="36" fill="#2A1A12"/>
    <rect x="242" y="68"  width="28" height="28" fill="#A020F0"/>
  </g>

  <!-- ===== ROKET (tengah atas) ===== -->
  <g>
    <!-- flame -->
    <rect x="490" y="116" width="8"  height="24" fill="#FF6F00"/>
    <rect x="492" y="120" width="4"  height="16" fill="#FCD34D"/>
    <!-- body -->
    <rect x="480" y="60"  width="32" height="56" fill="#B0B0B0"/>
    <rect x="486" y="48"  width="20" height="12" fill="#B0B0B0"/>
    <rect x="490" y="40"  width="12" height="8"  fill="#B0B0B0"/>
    <!-- window -->
    <rect x="488" y="72"  width="16" height="12" fill="#1FB6D8"/>
    <!-- wings -->
    <rect x="468" y="90"  width="12" height="20" fill="#9AA7B5"/>
    <rect x="512" y="90"  width="12" height="20" fill="#9AA7B5"/>
    <!-- fins -->
    <rect x="476" y="100" width="16" height="12" fill="#9AA7B5"/>
  </g>

  <!-- ===== STEVE + ELYTRA + ROCKET PACK (tengah) ===== -->
  <g>
    <!-- rocket pack flames -->
    <rect x="388" y="198" width="8"  height="14" fill="#FF6F00"/>
    <rect x="390" y="200" width="4"  height="10" fill="#FCD34D"/>
    <!-- elytra -->
    <rect x="358" y="162" width="18" height="10" fill="#C9CFD8"/><rect x="352" y="172" width="24" height="6" fill="#9AA7B5"/>
    <rect x="426" y="162" width="18" height="10" fill="#C9CFD8"/><rect x="426" y="172" width="24" height="6" fill="#9AA7B5"/>
    <!-- jetpack -->
    <rect x="386" y="166" width="12" height="28" fill="#9AA7B5"/>
    <!-- head -->
    <rect x="394" y="140" width="32" height="8"  fill="#5E3C1B"/>
    <rect x="394" y="148" width="32" height="16" fill="#E0B080"/>
    <rect x="400" y="150" width="20" height="10" fill="#1FB6D8"/>
    <!-- body -->
    <rect x="396" y="164" width="28" height="28" fill="#F2F4F7"/>
    <rect x="402" y="168" width="16" height="10" fill="#2E8FB8"/>
    <!-- arms -->
    <rect x="384" y="168" width="10" height="24" fill="#E6E9EE"/><rect x="384" y="188" width="10" height="4" fill="#2E8FB8"/>
    <rect x="422" y="168" width="10" height="24" fill="#E6E9EE"/><rect x="422" y="188" width="10" height="4" fill="#2E8FB8"/>
    <!-- legs -->
    <rect x="396" y="192" width="12" height="16" fill="#E6E9EE"/><rect x="396" y="206" width="12" height="4" fill="#2E8FB8"/>
    <rect x="412" y="192" width="12" height="16" fill="#E6E9EE"/><rect x="412" y="206" width="12" height="4" fill="#2E8FB8"/>
  </g>

  <!-- ===== ATMOSFER (siang) ===== -->
  <rect x="0" y="280" width="800" height="160" fill="#88CCEA"/>
  <rect x="0" y="440" width="800" height="80"  fill="#A8D8EF"/>
  <rect x="0" y="520" width="800" height="16"  fill="#5FB34A"/>
  <rect x="0" y="536" width="800" height="64"  fill="#8B5A2B"/>

  <!-- sun -->
  <rect x="120" y="300" width="48" height="48" fill="#FCD34D"/><rect x="132" y="312" width="24" height="24" fill="#FFE9A0"/>
  <!-- clouds -->
  <g fill="#FFFFFF">
    <rect x="80"  y="300" width="16" height="16"/><rect x="96"  y="300" width="16" height="16"/><rect x="80" y="316" width="16" height="16"/>
    <rect x="220" y="330" width="16" height="16"/><rect x="236" y="330" width="16" height="16"/>
    <rect x="360" y="308" width="16" height="16"/><rect x="376" y="308" width="16" height="16"/>
    <rect x="520" y="320" width="16" height="16"/><rect x="536" y="320" width="16" height="16"/>
    <rect x="620" y="300" width="16" height="16"/><rect x="636" y="300" width="16" height="16"/>
  </g>

  <!-- sign ABOUT ME -->
  <rect x="316" y="546" width="168" height="46" fill="#8B5A2B" stroke="#5E3C1B" stroke-width="4"/>
  <text x="400" y="576" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2E2BC" letter-spacing="2">ABOUT ME</text>

  <!-- border frame -->
  <rect x="2" y="2" width="796" height="596" fill="none" stroke="#5A5A5A" stroke-width="4"/>
  <rect x="6" y="6" width="788" height="588" fill="none" stroke="#8A8A8A" stroke-width="2" opacity="0.7"/>
</svg>
