      <ellipse cx="120" cy="470" rx="90" ry="26"/><ellipse cx="180" cy="480" rx="70" ry="22"/>
      <ellipse cx="640" cy="490" rx="100" ry="28"/><ellipse cx="560" cy="480" rx="60" ry="20"/>
