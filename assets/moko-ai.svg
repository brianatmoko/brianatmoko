  <text x="102" y="460" font-size="10" fill="#A0C0E0">Pemahaman &amp; generasi teks</text>

  <!-- Slot 4: AutoML -->
  <rect x="410" y="410" width="350" height="72" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="422" y="426" width="40"  height="40" fill="#C51A4A"/>
  <rect x="438" y="432" width="8"  height="28" fill="#FFFFFF"/>
  <rect x="426" y="444" width="28" height="8"  fill="#FFFFFF"/>
  <text x="472" y="440" font-size="13" font-weight="bold" fill="#FFFFFF">AutoML</text>
  <text x="472" y="460" font-size="10" fill="#A0C0E0">Latih &amp; optimalkan otomatis</text>

  <!-- footer: robot mascot + stack -->
  <rect x="60" y="506" width="60" height="54" fill="#9AA7B5"/>
  <rect x="70" y="520" width="40" height="18" fill="#1FB6D8"/>
  <rect x="72" y="546" width="36" height="6"  fill="#1C1C28"/>
  <rect x="86" y="494" width="4"  height="12" fill="#9AA7B5"/>
  <rect x="82" y="488" width="12" height="8"  fill="#FCD34D"/>
  <rect x="54" y="520" width="6"  height="18" fill="#9AA7B5"/>
  <rect x="116" y="520" width="6" height="18" fill="#9AA7B5"/>
  <text x="60" y="578" font-size="10" fill="#87CEEB">MOKO-AI CORE</text>

  <text x="440" y="524" font-size="11" font-weight="bold" fill="#87CEEB">BUILT WITH</text>
  <text x="440" y="544" font-size="10" fill="#A0C0E0">PyTorch . ONNX . OpenCV</text>
  <text x="440" y="562" font-size="10" fill="#A0C0E0">Hugging Face . TensorRT</text>

  <!-- creeper flavor -->
  <g>
    <rect x="640" y="500" width="100" height="100" fill="#4A8B3A"/>
    <rect x="660" y="520" width="18" height="18" fill="#1C1C28"/>
    <rect x="702" y="520" width="18" height="18" fill="#1C1C28"/>
    <rect x="672" y="552" width="10" height="10" fill="#1C1C28"/>
    <rect x="692" y="552" width="10" height="10" fill="#1C1C28"/>
    <rect x="712" y="552" width="10" height="10" fill="#1C1C28"/>
    <rect x="682" y="572" width="20" height="10" fill="#1C1C28"/>
  </g>

  <!-- border frame -->
  <rect x="2" y="2" width="796" height="596" fill="none" stroke="#5A5A5A" stroke-width="4"/>
