  <text x="92" y="286" font-size="11" fill="#1FB6D8">Integrated AI - Inference . Vision . NLP . AutoML</text>
  <line x1="40" y1="302" x2="760" y2="302" stroke="#8A8A8A" stroke-width="2"/>

  <!-- slot helper: 2x2 -->
  <!-- Slot 1: Inference Engine -->
  <rect x="40"  y="320" width="350" height="72" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="52"  y="336" width="40"  height="40" fill="#2E8FB8"/>
  <g fill="#FFFFFF">
    <rect x="60" y="344" width="8" height="8"/><rect x="72" y="344" width="8" height="8"/><rect x="84" y="344" width="8" height="8"/>
    <rect x="60" y="356" width="8" height="8"/><rect x="72" y="356" width="8" height="8"/><rect x="84" y="356" width="8" height="8"/>
    <rect x="60" y="368" width="8" height="8"/><rect x="72" y="368" width="8" height="8"/><rect x="84" y="368" width="8" height="8"/>
  </g>
  <text x="102" y="350" font-size="13" font-weight="bold" fill="#FFFFFF">Inference Engine</text>
  <text x="102" y="370" font-size="10" fill="#A0C0E0">Jalankan model on-edge &amp; cloud</text>

  <!-- Slot 2: Vision Pipeline -->
  <rect x="410" y="320" width="350" height="72" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="422" y="336" width="40"  height="40" fill="#5FB34A"/>
  <rect x="430" y="348" width="24" height="16" fill="#FFFFFF"/>
  <rect x="438" y="352" width="10" height="8"  fill="#1FB6D8"/>
  <rect x="442" y="354" width="4"  height="4"  fill="#1C1C28"/>
