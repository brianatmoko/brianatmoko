  <text x="472" y="370" font-size="10" fill="#A0C0E0">Deteksi objek &amp; pelacakan</text>

  <!-- Slot 3: NLP -->
  <rect x="40"  y="410" width="350" height="72" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="52"  y="426" width="40"  height="40" fill="#FCD34D"/>
  <rect x="58"  y="434" width="28" height="20" fill="#FFFFFF"/>
  <rect x="64"  y="440" width="6"  height="6"  fill="#1FB6D8"/>
  <rect x="74"  y="440" width="6"  height="6"  fill="#1FB6D8"/>
