  <g fill="#FFFFFF">
    <rect x="110" y="55" width="16" height="16"/><rect x="126" y="55" width="16" height="16"/><rect x="110" y="71" width="16" height="16"/>
    <rect x="300" y="45" width="16" height="16"/><rect x="316" y="45" width="16" height="16"/>
  </g>
  <!-- trees -->
  <rect x="70"  y="150" width="10" height="30" fill="#6E4420"/>
  <rect x="56"  y="120" width="38" height="34" fill="#4A8B3A"/><rect x="64" y="128" width="22" height="18" fill="#3A6E2C"/>
  <rect x="724" y="150" width="10" height="30" fill="#6E4420"/>
  <rect x="710" y="120" width="38" height="34" fill="#4A8B3A"/><rect x="718" y="128" width="22" height="18" fill="#3A6E2C"/>

