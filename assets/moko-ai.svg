    <rect x="398" y="164" width="28" height="24" fill="#F2F4F7"/>
    <rect x="404" y="168" width="16" height="10" fill="#2E8FB8"/>
    <rect x="386" y="168" width="10" height="20" fill="#E6E9EE"/>
    <rect x="424" y="168" width="10" height="20" fill="#E6E9EE"/>
    <rect x="398" y="188" width="12" height="14" fill="#E6E9EE"/>
    <rect x="414" y="188" width="12" height="14" fill="#E6E9EE"/>
  </g>

  <!-- sign ZONA 3 -->
  <rect x="500" y="158" width="200" height="46" fill="#8B5A2B" stroke="#5E3C1B" stroke-width="4"/>
  <text x="600" y="178" text-anchor="middle" font-size="15" font-weight="bold" fill="#FCD34D">ZONA 3</text>
  <text x="600" y="196" text-anchor="middle" font-size="10" fill="#1FB6D8" letter-spacing="1">PERMUKAAN</text>

  <!-- ===== PANEL MOKO-AI ===== -->
  <rect x="0"   y="220" width="800" height="380" fill="#1C1C28"/>
  <rect x="10"  y="230" width="780" height="360" fill="#2A2A3A"/>
  <rect x="4"   y="224" width="792" height="372" fill="none" stroke="#8A8A8A" stroke-width="4"/>
  <rect x="9"   y="229" width="782" height="362" fill="none" stroke="#B8B8B8" stroke-width="1" opacity="0.5"/>

