  <rect x="46" y="258" width="28" height="12" fill="#1FB6D8"/>
  <rect x="56" y="242" width="4"  height="8"  fill="#9AA7B5"/>
  <rect x="54" y="238" width="8"  height="6"  fill="#FCD34D"/>
