<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Courier New', monospace">
  <!-- ===== PERMUKAAN: langit + tanah ===== -->
  <rect x="0" y="0"   width="800" height="180" fill="#88CCEA"/>
  <rect x="0" y="180" width="800" height="16"  fill="#5FB34A"/>
  <rect x="0" y="196" width="800" height="24"  fill="#8B5A2B"/>

  <!-- sun -->
  <rect x="690" y="24" width="40" height="40" fill="#FCD34D"/><rect x="702" y="36" width="16" height="16" fill="#FFE9A0"/>
