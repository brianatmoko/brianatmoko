  <rect x="36" y="252" width="24" height="10" fill="#1FB6D8"/>
  <rect x="44" y="236" width="4"  height="8"  fill="#9AA7B5"/>
  <rect x="42" y="232" width="8"  height="6"  fill="#FCD34D"/>
