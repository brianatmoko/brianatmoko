  <text x="92" y="434" font-size="10" fill="#A0C0E0" font-family="monospace">Eksplorasi teknologi baru setiap hari</text>

  <!-- Slot 4: Build with Purpose -->
  <rect x="410" y="392" width="360" height="68" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="422" y="408" width="40"  height="38" fill="#5FB34A" stroke="#3A7A2A" stroke-width="2"/>
  <rect x="430" y="416" width="24" height="22" fill="#FFFFFF"/>
  <rect x="438" y="422" width="8"  height="10" fill="#5FB34A"/>
  <rect x="434" y="430" width="16" height="4" fill="#5FB34A"/>
  <text x="472" y="416" font-size="13" font-weight="bold" fill="#FFFFFF" font-family="monospace">Build with Purpose</text>
  <text x="472" y="434" font-size="10" fill="#A0C0E0" font-family="monospace">Kode yang bersih, bermakna, scalable</text>

  <!-- divider -->
  <rect x="30" y="476" width="740" height="2" fill="#5A5A5A"/>

  <!-- mission statement + MOKO-AI -->
  <rect x="30" y="492" width="740" height="96" fill="#23233A" stroke="#FCD34D" stroke-width="2"/>
  <rect x="28" y="490" width="744" height="100" fill="none" stroke="#8A8A8A" stroke-width="1" opacity="0.3"/>
  <rect x="42" y="504" width="40" height="40" fill="#1FB6D8" stroke="#0E5A7A" stroke-width="2"/>
  <rect x="48" y="512" width="28" height="10" fill="#FFFFFF"/>
  <rect x="56" y="496" width="4"  height="8"  fill="#1FB6D8"/>
  <rect x="54" y="492" width="8"  height="6"  fill="#9AA7B5"/>
  <text x="92" y="512" font-size="13" font-weight="bold" fill="#FCD34D" font-family="monospace">Mission: MOKO-AI</text>
  <text x="92" y="530" font-size="10" fill="#A0C0E0" font-family="monospace">Mewujudkan AI yang accessible, on-edge, dan terintegrasi</text>
  <text x="92" y="548" font-size="10" fill="#A0C0E0" font-family="monospace">Dari angkasa ke inti bumi - perjalanan tanpa batas</text>

  <!-- creeper -->
  <g>
    <rect x="650" y="496" width="100" height="100" fill="#4A8B3A" stroke="#3A6E2C" stroke-width="2"/>
    <rect x="670" y="516" width="18" height="18" fill="#1C1C28"/>
    <rect x="712" y="516" width="18" height="18" fill="#1C1C28"/>
    <rect x="682" y="548" width="10" height="10" fill="#1C1C28"/>
    <rect x="702" y="548" width="10" height="10" fill="#1C1C28"/>
    <rect x="722" y="548" width="10" height="10" fill="#1C1C28"/>
    <rect x="692" y="568" width="20" height="10" fill="#1C1C28"/>
  </g>

  <rect x="2" y="2" width="796" height="596" fill="none" stroke="#5A5A5A" stroke-width="4"/>
</svg>
