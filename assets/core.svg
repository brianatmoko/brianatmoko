  <rect x="30" y="290" width="740" height="2" fill="#5A5A5A"/>

  <!-- Slot 1: Open Source -->
  <rect x="30"  y="306" width="360" height="68" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="42"  y="322" width="40"  height="38" fill="#FCD34D" stroke="#B89B20" stroke-width="2"/>
  <rect x="50"  y="330" width="24" height="22" fill="#FFFFFF"/>
  <rect x="56"  y="340" width="6"  height="4"  fill="#FCD34D"/>
  <rect x="58"  y="338" width="2"  height="10" fill="#FCD34D"/>
  <text x="92" y="330" font-size="13" font-weight="bold" fill="#FFFFFF" font-family="monospace">Open Source</text>
  <text x="92" y="348" font-size="10" fill="#A0C0E0" font-family="monospace">Membangun &amp; berkontribusi untuk komunitas</text>

  <!-- Slot 2: Impact -->
  <rect x="410" y="306" width="360" height="68" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="422" y="322" width="40"  height="38" fill="#C51A4A" stroke="#8A0A2A" stroke-width="2"/>
  <rect x="430" y="330" width="24" height="22" fill="#FFFFFF"/>
  <rect x="438" y="336" width="8"  height="10" fill="#C51A4A"/>
  <text x="472" y="330" font-size="13" font-weight="bold" fill="#FFFFFF" font-family="monospace">Impact</text>
  <text x="472" y="348" font-size="10" fill="#A0C0E0" font-family="monospace">Solusi nyata untuk masalah nyata</text>

  <!-- Slot 3: Continuous Learning -->
  <rect x="30"  y="392" width="360" height="68" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="42"  y="408" width="40"  height="38" fill="#2E8FB8" stroke="#1E5A7A" stroke-width="2"/>
  <rect x="50"  y="416" width="24" height="22" fill="#FFFFFF"/>
  <rect x="56"  y="422" width="12" height="10" fill="#2E8FB8"/>
  <rect x="62"  y="416" width="4"  height="4"  fill="#2E8FB8"/>
