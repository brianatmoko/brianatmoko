  <g fill="#FCD34D">
    <rect x="340" y="90"  width="4" height="4"/><rect x="360" y="140" width="4" height="4"/><rect x="450" y="100" width="4" height="4"/>
  </g>
  <g fill="#1FB6D8">
    <rect x="440" y="70"  width="4" height="4"/><rect x="400" y="58"  width="4" height="4"/>
  </g>

  <!-- Villager -->
  <g>
    <rect x="248" y="148" width="32" height="6"  fill="#3A2A1A"/>
    <rect x="248" y="154" width="32" height="18" fill="#D6A47B"/>
    <rect x="252" y="158" width="4"  height="4"  fill="#1C1C28"/>
    <rect x="272" y="158" width="4"  height="4"  fill="#1C1C28"/>
