  <text x="580" y="96" text-anchor="middle" font-size="10" fill="#1FB6D8" font-family="monospace">INTI BUMI</text>

  <!-- ===== PANEL CORE VALUES ===== -->
  <rect x="0"   y="220" width="800" height="380" fill="#1C1C28"/>
  <rect x="4"   y="224" width="792" height="372" fill="#3A3A3A"/>
  <rect x="6"   y="226" width="788" height="368" fill="#2E2E42"/>
  <rect x="2"   y="222" width="796" height="376" fill="none" stroke="#5A5A5A" stroke-width="2"/>
  <rect x="8"   y="228" width="784" height="364" fill="none" stroke="#8A8A8A" stroke-width="2"/>

