<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Courier New', monospace">
  <!-- ===== DALAM INTII (transisi dari Zona 4) ===== -->
  <rect x="0"  y="0"   width="800" height="40"  fill="#15131F"/>
  <rect x="0"  y="40"  width="800" height="180" fill="#2A1810"/>
  <rect x="0"  y="40"  width="40"  height="180" fill="#1A1A28"/>
  <rect x="760" y="40"  width="40"  height="180" fill="#1A1A28"/>
  <rect x="0"  y="196" width="800" height="24"  fill="#FF6F00"/>
  <rect x="0"  y="196" width="800" height="6"   fill="#FFD08A"/>

  <!-- core glow + nested energy -->
  <rect x="350" y="60"  width="100" height="100" fill="#FF6F00" opacity="0.25"/>
  <rect x="364" y="74"  width="72"  height="72"  fill="#FF6F00"/>
  <rect x="376" y="86"  width="48"  height="48"  fill="#FCD34D"/>
  <rect x="388" y="98"  width="24"  height="24"  fill="#1FB6D8"/>
  <rect x="396" y="106" width="8"   height="8"   fill="#FFFFFF"/>
  <g fill="#FCD34D">
    <rect x="340" y="90"  width="4" height="4"/><rect x="360" y="140" width="4" height="4"/><rect x="450" y="100" width="4" height="4"/>
  </g>
  <g fill="#1FB6D8">
    <rect x="440" y="70"  width="4" height="4"/><rect x="400" y="58"  width="4" height="4"/>
  </g>

  <!-- Villager before the core -->
  <g>
    <rect x="248" y="148" width="32" height="6"  fill="#3A2A1A"/>
    <rect x="248" y="154" width="32" height="18" fill="#D6A47B"/>
    <rect x="252" y="158" width="4"  height="4"  fill="#1C1C28"/>
    <rect x="272" y="158" width="4"  height="4"  fill="#1C1C28"/>
    <rect x="260" y="160" width="8"  height="10" fill="#C49565"/>
    <rect x="252" y="172" width="24" height="28" fill="#8B5A2B"/>
    <rect x="256" y="178" width="16" height="10" fill="#6E4420"/>
    <rect x="244" y="174" width="8"  height="20" fill="#8B5A2B"/>
    <rect x="276" y="174" width="8"  height="20" fill="#8B5A2B"/>
    <rect x="254" y="200" width="8"  height="10" fill="#4A3A2A"/>
    <rect x="266" y="200" width="8"  height="10" fill="#4A3A2A"/>
  </g>

  <!-- sign ZONA 5 -->
  <rect x="470" y="58" width="220" height="46" fill="#8B5A2B" stroke="#5E3C1B" stroke-width="4"/>
  <text x="580" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#FCD34D">ZONA 5</text>
  <text x="580" y="96" text-anchor="middle" font-size="10" fill="#1FB6D8" letter-spacing="1">INTI BUMI</text>

  <!-- ===== PANEL MOKO-AI CORE ===== -->
  <rect x="0"   y="220" width="800" height="380" fill="#1C1C28"/>
  <rect x="10"  y="230" width="780" height="360" fill="#2A2A3A"/>
  <rect x="4"   y="224" width="792" height="372" fill="none" stroke="#8A8A8A" stroke-width="4"/>
  <rect x="9"   y="229" width="782" height="362" fill="none" stroke="#B8B8B8" stroke-width="1" opacity="0.5"/>

  <!-- header -->
  <rect x="40" y="250" width="36" height="36" fill="#FF6F00"/>
  <rect x="48" y="258" width="20" height="20" fill="#1FB6D8"/>
  <rect x="54" y="264" width="8"  height="8"  fill="#FFFFFF"/>
  <text x="86" y="264" font-size="24" font-weight="bold" fill="#FCD34D">MOKO-AI CORE</text>
  <text x="86" y="286" font-size="11" fill="#1FB6D8">Unified Intelligence - dari angkasa ke inti bumi</text>
  <line x1="40" y1="302" x2="760" y2="302" stroke="#8A8A8A" stroke-width="2"/>

  <!-- Slot 1: Perception -->
  <rect x="40"  y="320" width="350" height="72" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="52"  y="336" width="40"  height="40" fill="#5FB34A"/>
  <rect x="58"  y="344" width="22" height="14" fill="#FFFFFF"/><rect x="64" y="348" width="9" height="6" fill="#1FB6D8"/>
  <rect x="58"  y="360" width="20" height="12" fill="#FFFFFF"/><rect x="63" y="364" width="5" height="5" fill="#1FB6D8"/>
  <text x="102" y="350" font-size="13" font-weight="bold" fill="#FFFFFF">Perception</text>
  <text x="102" y="370" font-size="10" fill="#A0C0E0">Vision + NLP (Zona 3)</text>

  <!-- Slot 2: Reasoning -->
  <rect x="410" y="320" width="350" height="72" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="422" y="336" width="40"  height="40" fill="#2E8FB8"/>
  <g fill="#FFFFFF">
    <rect x="430" y="344" width="8" height="8"/><rect x="442" y="344" width="8" height="8"/><rect x="454" y="344" width="8" height="8"/>
    <rect x="430" y="356" width="8" height="8"/><rect x="442" y="356" width="8" height="8"/><rect x="454" y="356" width="8" height="8"/>
    <rect x="430" y="368" width="8" height="8"/><rect x="442" y="368" width="8" height="8"/><rect x="454" y="368" width="8" height="8"/>
  </g>
  <text x="472" y="350" font-size="13" font-weight="bold" fill="#FFFFFF">Reasoning</text>
  <text x="472" y="370" font-size="10" fill="#A0C0E0">Inference Engine (Zona 3)</text>

  <!-- Slot 3: Learning -->
  <rect x="40"  y="410" width="350" height="72" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="52"  y="426" width="40"  height="40" fill="#FCD34D"/>
  <rect x="68"  y="432" width="8"  height="28" fill="#FFFFFF"/><rect x="56" y="444" width="28" height="8" fill="#FFFFFF"/>
  <text x="102" y="440" font-size="13" font-weight="bold" fill="#FFFFFF">Learning</text>
  <text x="102" y="460" font-size="10" fill="#A0C0E0">AutoML (Zona 3)</text>

  <!-- Slot 4: Action -->
  <rect x="410" y="410" width="350" height="72" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="422" y="426" width="40"  height="40" fill="#1FB6D8"/>
  <rect x="430" y="432" width="24" height="18" fill="#FFFFFF"/><rect x="438" y="450" width="8" height="6" fill="#FFFFFF"/>
  <text x="472" y="440" font-size="13" font-weight="bold" fill="#FFFFFF">Action</text>
  <text x="472" y="460" font-size="10" fill="#A0C0E0">Edge Nodes (Zona 4)</text>

  <!-- footer: glowing core + cta -->
  <rect x="60" y="506" width="56" height="54" fill="#FF6F00"/>
  <rect x="70" y="516" width="36" height="36" fill="#FCD34D"/>
  <rect x="80" y="526" width="16" height="16" fill="#1FB6D8"/>
  <text x="60" y="578" font-size="10" fill="#87CEEB">MOKO-AI ONLINE</text>

  <text x="440" y="524" font-size="11" font-weight="bold" fill="#87CEEB">JOURNEY SELESAI</text>
  <text x="440" y="544" font-size="10" fill="#A0C0E0">Angkasa . Atmosfer . Permukaan</text>
  <text x="440" y="562" font-size="10" fill="#A0C0E0">Bawah Tanah . Inti Bumi</text>

  <g>
    <rect x="640" y="500" width="100" height="100" fill="#4A8B3A"/>
    <rect x="660" y="520" width="18" height="18" fill="#1C1C28"/>
    <rect x="702" y="520" width="18" height="18" fill="#1C1C28"/>
    <rect x="672" y="552" width="10" height="10" fill="#1C1C28"/>
    <rect x="692" y="552" width="10" height="10" fill="#1C1C28"/>
    <rect x="712" y="552" width="10" height="10" fill="#1C1C28"/>
    <rect x="682" y="572" width="20" height="10" fill="#1C1C28"/>
  </g>

  <rect x="2" y="2" width="796" height="596" fill="none" stroke="#5A5A5A" stroke-width="4"/>
</svg>
