      <line x1="155" y1="85" x2="153" y2="80" stroke-width="1"/>
      <line x1="180" y1="85" x2="182" y2="79" stroke-width="1"/>
      <line x1="210" y1="85" x2="208" y2="81" stroke-width="1.2"/>
      <line x1="235" y1="85" x2="237" y2="78" stroke-width="1"/>
      <line x1="260" y1="85" x2="258" y2="80" stroke-width="1"/>
      <line x1="290" y1="85" x2="292" y2="79" stroke-width="1.2"/>
