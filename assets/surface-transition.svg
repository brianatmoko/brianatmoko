      <line x1="370" y1="85" x2="368" y2="81" stroke-width="1.2"/>
      <line x1="400" y1="85" x2="402" y2="79" stroke-width="1"/>
      <line x1="430" y1="85" x2="428" y2="80" stroke-width="1"/>
      <line x1="460" y1="85" x2="462" y2="78" stroke-width="1.2"/>
      <line x1="490" y1="85" x2="488" y2="81" stroke-width="1"/>
      <line x1="520" y1="85" x2="522" y2="79" stroke-width="1"/>
      <line x1="550" y1="85" x2="548" y2="80" stroke-width="1.2"/>
      <line x1="580" y1="85" x2="582" y2="78" stroke-width="1"/>
      <line x1="610" y1="85" x2="608" y2="81" stroke-width="1"/>
      <line x1="640" y1="85" x2="642" y2="79" stroke-width="1.2"/>
      <line x1="670" y1="85" x2="668" y2="80" stroke-width="1"/>
      <line x1="700" y1="85" x2="702" y2="78" stroke-width="1"/>
      <line x1="730" y1="85" x2="728" y2="81" stroke-width="1.2"/>
      <line x1="760" y1="85" x2="762" y2="79" stroke-width="1"/>
      <line x1="790" y1="85" x2="788" y2="80" stroke-width="1"/>
