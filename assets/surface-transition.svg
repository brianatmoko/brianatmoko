<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyToGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#A0D8EF"/>
      <stop offset="70%" stop-color="#8FBC8F"/>
      <stop offset="100%" stop-color="#5B8C2A"/>
    </linearGradient>
  </defs>

  <rect width="800" height="120" fill="url(#skyToGround)"/>

  <!-- Clouds (lower, thicker) -->
  <g fill="#FFFFFF" opacity="0.25">
    <ellipse cx="80" cy="30" rx="100" ry="16"/>
    <ellipse cx="300" cy="25" rx="130" ry="18"/>
    <ellipse cx="550" cy="35" rx="110" ry="14"/>
    <ellipse cx="750" cy="28" rx="90" ry="12"/>
  </g>

  <g fill="#FFFFFF" opacity="0.15">
    <ellipse cx="180" cy="45" rx="80" ry="10"/>
    <ellipse cx="450" cy="40" rx="90" ry="12"/>
    <ellipse cx="650" cy="48" rx="70" ry="8"/>
  </g>

  <!-- Trees in the distance -->
  <g fill="#3C6B1E" opacity="0.4">
    <polygon points="30,60 38,40 46,60"/>
    <polygon points="55,60 63,35 71,60"/>
    <polygon points="75,60 83,42 91,60"/>
    <polygon points="150,60 158,38 166,60"/>
    <polygon points="170,60 178,45 186,60"/>
    <polygon points="250,60 258,40 266,60"/>
    <polygon points="350,60 358,36 366,60"/>
    <polygon points="450,60 458,42 466,60"/>
    <polygon points="550,60 558,38 566,60"/>
    <polygon points="650,60 658,44 666,60"/>
    <polygon points="720,60 728,40 736,60"/>
    <polygon points="755,60 763,46 771,60"/>
  </g>

  <g fill="#4A7A28" opacity="0.3">
    <polygon points="100,60 108,45 116,60"/>
    <polygon points="200,60 208,42 216,60"/>
    <polygon points="300,60 308,48 316,60"/>
    <polygon points="400,60 408,38 416,60"/>
    <polygon points="500,60 508,44 516,60"/>
    <polygon points="600,60 608,40 616,60"/>
    <polygon points="700,60 708,46 716,60"/>
  </g>

  <!-- Grass block texture (bottom section) -->
  <g>
    <!-- Top grass line -->
    <rect x="0" y="85" width="800" height="35" fill="#5B8C2A"/>
    <!-- Grass block pattern -->
    <g fill="#4A7A22" opacity="0.5">
      <rect x="0" y="85" width="100" height="17"/>
      <rect x="200" y="85" width="100" height="17"/>
      <rect x="400" y="85" width="100" height="17"/>
      <rect x="600" y="85" width="100" height="17"/>
    </g>
    <g fill="#4A7A22" opacity="0.3">
      <rect x="100" y="85" width="100" height="17"/>
      <rect x="300" y="85" width="100" height="17"/>
      <rect x="500" y="85" width="100" height="17"/>
      <rect x="700" y="85" width="100" height="17"/>
    </g>
    <!-- Dirt layer -->
    <rect x="0" y="102" width="800" height="18" fill="#8B6B3D"/>
    <g fill="#7A5D32" opacity="0.4">
      <rect x="50" y="102" width="100" height="18"/>
      <rect x="250" y="102" width="100" height="18"/>
      <rect x="450" y="102" width="100" height="18"/>
      <rect x="650" y="102" width="100" height="18"/>
