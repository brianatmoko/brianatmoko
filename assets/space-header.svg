<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="30%" stop-color="#141452"/>
      <stop offset="60%" stop-color="#1e2466"/>
      <stop offset="100%" stop-color="#2d3a7a"/>
    </linearGradient>
    <radialGradient id="moonSurface" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#FFFDE8"/>
      <stop offset="60%" stop-color="#F5F0D0"/>
      <stop offset="100%" stop-color="#E8DCA0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#sky)" rx="16"/>

  <!-- Stars -->
  <g fill="#FFF">
    <circle cx="45" cy="30" r="1.8" opacity="0.9"/>
    <circle cx="120" cy="65" r="1.2" opacity="0.6"/>
    <circle cx="200" cy="25" r="2" opacity="0.85"/>
    <circle cx="310" cy="50" r="1" opacity="0.5"/>
    <circle cx="400" cy="35" r="1.5" opacity="0.7"/>
    <circle cx="500" cy="60" r="2.2" opacity="0.9"/>
    <circle cx="580" cy="20" r="1" opacity="0.4"/>
    <circle cx="650" cy="55" r="1.8" opacity="0.8"/>
    <circle cx="720" cy="30" r="1.3" opacity="0.6"/>
    <circle cx="760" cy="70" r="2" opacity="0.75"/>
    <circle cx="80" cy="95" r="1" opacity="0.4"/>
    <circle cx="160" cy="85" r="1.5" opacity="0.7"/>
    <circle cx="250" cy="105" r="0.8" opacity="0.3"/>
    <circle cx="340" cy="80" r="1.2" opacity="0.5"/>
    <circle cx="460" cy="95" r="1.8" opacity="0.8"/>
    <circle cx="550" cy="90" r="1" opacity="0.4"/>
    <circle cx="670" cy="110" r="1.5" opacity="0.6"/>
    <circle cx="740" cy="85" r="1.2" opacity="0.5"/>
    <circle cx="20" cy="150" r="0.8" opacity="0.3"/>
    <circle cx="180" cy="140" r="1.2" opacity="0.5"/>
    <circle cx="350" cy="130" r="0.8" opacity="0.3"/>
    <circle cx="520" cy="145" r="1" opacity="0.4"/>
    <circle cx="700" cy="150" r="0.8" opacity="0.35"/>
  </g>

  <!-- Cross stars -->
  <g stroke="#FFF" stroke-width="1.2" opacity="0.6">
    <line x1="230" y1="48" x2="238" y2="56"/>
    <line x1="238" y1="48" x2="230" y2="56"/>
    <line x1="620" y1="40" x2="628" y2="48"/>
    <line x1="628" y1="40" x2="620" y2="48"/>
    <line x1="480" y1="128" x2="488" y2="136"/>
    <line x1="488" y1="128" x2="480" y2="136"/>
  </g>

  <!-- Moon -->
  <g transform="translate(620,90)">
    <circle cx="0" cy="0" r="48" fill="url(#moonSurface)" stroke="#C8B878" stroke-width="1.5"/>
    <rect x="-18" y="-22" width="12" height="9" rx="2" fill="#D8CCA0" opacity="0.5"/>
    <rect x="6" y="-12" width="8" height="7" rx="1.5" fill="#D8CCA0" opacity="0.4"/>
    <rect x="-8" y="6" width="14" height="9" rx="2" fill="#D8CCA0" opacity="0.35"/>
    <rect x="16" y="12" width="6" height="5" rx="1" fill="#D8CCA0" opacity="0.4"/>
    <rect x="-24" y="16" width="7" height="5" rx="1" fill="#D8CCA0" opacity="0.25"/>
  </g>

  <!-- Small planet -->
  <g transform="translate(105,130)">
    <circle cx="0" cy="0" r="16" fill="#8B5CF6" opacity="0.6"/>
    <ellipse cx="0" cy="2" rx="18" ry="4" fill="none" stroke="#A78BFA" stroke-width="0.8" opacity="0.4" transform="rotate(-15)"/>
  </g>

  <!-- Astronaut with Balloon (Detailed) -->
  <g transform="translate(340,190)">
    <!-- ===== BACKGROUND GLOW ===== -->
    <circle cx="0" cy="0" r="65" fill="#87CEEB" opacity="0.04"/>

    <!-- ===== BALLOON ===== -->
    <!-- Balloon body -->
    <ellipse cx="-18" cy="-112" rx="32" ry="40" fill="#FF6B6B" opacity="0.9"/>
    <ellipse cx="-18" cy="-112" rx="32" ry="40" fill="none" stroke="#DD4444" stroke-width="0.8"/>
    <!-- Balloon main highlight -->
    <ellipse cx="-28" cy="-126" rx="10" ry="14" fill="#FFFFFF" opacity="0.15"/>
    <ellipse cx="-32" cy="-132" rx="4" ry="6" fill="#FFFFFF" opacity="0.2"/>
    <!-- Balloon secondary highlight (bottom) -->
    <ellipse cx="-8" cy="-94" rx="6" ry="4" fill="#FFFFFF" opacity="0.08"/>
    <!-- Balloon knot -->
    <polygon points="-18,-72 -22,-68 -14,-68" fill="#DD4444"/>
    <polygon points="-18,-72 -22,-68 -14,-68" fill="none" stroke="#BB2222" stroke-width="0.5"/>

    <!-- ===== BALLOON STRING (held by left hand) ===== -->
    <!-- String from knot to left hand -->
    <path d="M -18,-68 Q -30,-55 -34,-38" fill="none" stroke="#CCCCCC" stroke-width="1.2" stroke-dasharray="5,3"/>
    <path d="M -18,-68 Q -30,-55 -34,-38" fill="none" stroke="#FFFFFF" stroke-width="0.3" opacity="0.3"/>

    <!-- ===== BACKPACK (Life Support) ===== -->
    <!-- Main pack -->
    <rect x="10" y="-6" width="16" height="30" rx="4" fill="#A8A8A8" stroke="#808080" stroke-width="1"/>
    <!-- Pack details -->
    <rect x="13" y="0" width="10" height="4" rx="1" fill="#909090"/>
    <rect x="13" y="8" width="10" height="4" rx="1" fill="#909090"/>
    <rect x="13" y="16" width="10" height="4" rx="1" fill="#909090"/>
    <!-- Oxygen tube from pack to helmet -->
    <path d="M 12,2 Q 18,-8 12,-20" fill="none" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/>
    <path d="M 12,2 Q 18,-8 12,-20" fill="none" stroke="#D0D0D0" stroke-width="0.8" opacity="0.5"/>
    <!-- Wire from pack to belt -->
    <path d="M 14,24 Q 6,26 8,28" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.6"/>

    <!-- ===== TORSO (Spacesuit Body) ===== -->
    <!-- Main body -->
    <rect x="-13" y="-14" width="26" height="38" rx="8" fill="#F0F0F0" stroke="#C0C0C0" stroke-width="1.2"/>
    <!-- Body shading (left edge) -->
    <rect x="-13" y="-14" width="6" height="38" rx="8" fill="#E0E0E0" opacity="0.5"/>
    <rect x="-13" y="-14" width="3" height="38" rx="8" fill="#D0D0D0" opacity="0.3"/>
    <!-- Body shading (right edge) -->
    <rect x="7" y="-14" width="6" height="38" rx="8" fill="#FFFFFF" opacity="0.15"/>

    <!-- Chest control panel -->
    <rect x="-6" y="-8" width="12" height="8" rx="2" fill="#D8D8D8" stroke="#B0B0B0" stroke-width="0.6"/>
    <!-- Control buttons -->
    <circle cx="-3" cy="-5" r="1.8" fill="#FF4444"/>
    <circle cx="1" cy="-5" r="1.8" fill="#00D2FF"/>
    <circle cx="5" cy="-5" r="1.8" fill="#7BBC5B"/>
    <!-- Small screen on chest -->
    <rect x="-4" y="-2" width="8" height="3" rx="0.5" fill="#1A1A4E"/>
    <line x1="-3" y1="-1" x2="3" y2="-1" stroke="#00D2FF" stroke-width="0.4" opacity="0.6"/>

    <!-- Chest patch/badge -->
    <rect x="-8" y="2" width="4" height="4" rx="0.5" fill="#DD4444"/>
    <rect x="-8" y="2" width="4" height="4" rx="0.5" fill="none" stroke="#BB2222" stroke-width="0.3"/>
    <line x1="-7" y1="3" x2="-5" y2="3" stroke="#FFFFFF" stroke-width="0.4"/>
    <line x1="-7" y1="4" x2="-5" y2="4" stroke="#FFFFFF" stroke-width="0.4"/>

    <!-- Belt -->
    <rect x="-13" y="-1" width="26" height="4" rx="1" fill="#DD4444" stroke="#BB2222" stroke-width="0.5"/>
    <!-- Belt buckle -->
    <rect x="-3" y="-1" width="6" height="4" rx="0.5" fill="#FFD700" stroke="#CC9900" stroke-width="0.3"/>
    <rect x="-1" y="0" width="2" height="3" rx="0.3" fill="#CC9900"/>

    <!-- Belt pouches -->
    <rect x="6" y="0" width="5" height="6" rx="1" fill="#D0D0D0" stroke="#A0A0A0" stroke-width="0.5"/>
    <rect x="-11" y="0" width="5" height="6" rx="1" fill="#D0D0D0" stroke="#A0A0A0" stroke-width="0.5"/>

    <!-- Lower torso detail -->
    <rect x="-11" y="12" width="22" height="4" rx="2" fill="#D8D8D8" stroke="#C0C0C0" stroke-width="0.3"/>
    <rect x="-11" y="18" width="22" height="4" rx="2" fill="#D8D8D8" stroke="#C0C0C0" stroke-width="0.3"/>

    <!-- ===== LEFT LEG ===== -->
    <!-- Upper leg -->
    <path d="M -7,22 Q -14,38 -17,46" fill="none" stroke="#F0F0F0" stroke-width="10" stroke-linecap="round"/>
    <path d="M -7,22 Q -14,38 -17,46" fill="none" stroke="#E0E0E0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Knee joint ring -->
    <path d="M -12,36 Q -17,39 -14,42" fill="none" stroke="#C0C0C0" stroke-width="2"/>
    <!-- Lower leg -->
    <path d="M -17,46 Q -19,52 -18,60" fill="none" stroke="#F0F0F0" stroke-width="10" stroke-linecap="round"/>
    <path d="M -17,46 Q -19,52 -18,60" fill="none" stroke="#E0E0E0" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <!-- Left boot -->
    <path d="M -24,58 Q -26,62 -22,65 L -14,65 Q -10,62 -12,58" fill="#A0A0A0" stroke="#808080" stroke-width="0.8"/>
    <!-- Boot sole detail -->
    <path d="M -24,62 Q -26,65 -22,66 L -14,66 Q -10,65 -12,62" fill="#707070"/>
    <!-- Boot treads -->
    <line x1="-22" y1="63" x2="-14" y2="63" stroke="#606060" stroke-width="0.4"/>
    <line x1="-23" y1="64" x2="-13" y2="64" stroke="#606060" stroke-width="0.4"/>

    <!-- ===== RIGHT LEG ===== -->
    <!-- Upper leg -->
    <path d="M 7,22 Q 14,38 17,46" fill="none" stroke="#F0F0F0" stroke-width="10" stroke-linecap="round"/>
    <path d="M 7,22 Q 14,38 17,46" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <!-- Knee joint ring -->
    <path d="M 12,36 Q 17,39 14,42" fill="none" stroke="#C0C0C0" stroke-width="2"/>
    <!-- Lower leg -->
    <path d="M 17,46 Q 19,52 18,60" fill="none" stroke="#F0F0F0" stroke-width="10" stroke-linecap="round"/>
    <path d="M 17,46 Q 19,52 18,60" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
    <!-- Right boot -->
    <path d="M 12,58 Q 10,62 14,65 L 22,65 Q 26,62 24,58" fill="#A0A0A0" stroke="#808080" stroke-width="0.8"/>
    <!-- Boot sole detail -->
    <path d="M 12,62 Q 10,65 14,66 L 22,66 Q 26,65 24,62" fill="#707070"/>
    <!-- Boot treads -->
    <line x1="14" y1="63" x2="22" y2="63" stroke="#606060" stroke-width="0.4"/>
    <line x1="13" y1="64" x2="23" y2="64" stroke="#606060" stroke-width="0.4"/>

    <!-- ===== LEFT ARM (holding balloon string) ===== -->
    <!-- Upper arm -->
    <path d="M -10,0 Q -20,-12 -26,-24" fill="none" stroke="#F0F0F0" stroke-width="8" stroke-linecap="round"/>
    <path d="M -10,0 Q -20,-12 -26,-24" fill="none" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <!-- Elbow joint ring -->
    <path d="M -20,-12 Q -23,-15 -21,-18" fill="none" stroke="#C0C0C0" stroke-width="1.5"/>
    <!-- Forearm -->
    <path d="M -26,-24 Q -30,-30 -33,-36" fill="none" stroke="#F0F0F0" stroke-width="7" stroke-linecap="round"/>
    <path d="M -26,-24 Q -30,-30 -33,-36" fill="none" stroke="#E0E0E0" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Left glove holding string -->
    <ellipse cx="-34" cy="-38" rx="5" ry="4.5" fill="#B8B8B8" stroke="#909090" stroke-width="0.8"/>
    <!-- Glove fingers gripping string -->
    <path d="M -37,-39 Q -39,-38 -38,-36" fill="none" stroke="#A0A0A0" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M -36,-40 Q -38,-39 -37,-37" fill="none" stroke="#A0A0A0" stroke-width="1" stroke-linecap="round"/>
    <path d="M -35,-41 Q -37,-40 -36,-38" fill="none" stroke="#A0A0A0" stroke-width="0.8" stroke-linecap="round"/>

    <!-- ===== RIGHT ARM (waving) ===== -->
    <!-- Upper arm -->
    <path d="M 10,0 Q 20,-6 26,-10" fill="none" stroke="#F0F0F0" stroke-width="8" stroke-linecap="round"/>
    <path d="M 10,0 Q 20,-6 26,-10" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <!-- Elbow joint ring -->
    <path d="M 20,-6 Q 23,-9 22,-12" fill="none" stroke="#C0C0C0" stroke-width="1.5"/>
    <!-- Forearm -->
    <path d="M 26,-10 Q 30,-12 34,-12" fill="none" stroke="#F0F0F0" stroke-width="7" stroke-linecap="round"/>
    <path d="M 26,-10 Q 30,-12 34,-12" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
    <!-- Wrist joint -->
    <path d="M 32,-11 Q 34,-13 33,-15" fill="none" stroke="#C0C0C0" stroke-width="1.2"/>
    <!-- Right glove (waving hand) -->
    <ellipse cx="36" cy="-12" rx="5.5" ry="5" fill="#B8B8B8" stroke="#909090" stroke-width="0.8"/>
    <!-- Glove fingers spread (waving) -->
    <path d="M 39,-14 Q 42,-13 41,-10" fill="none" stroke="#A0A0A0" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 40,-12 Q 43,-11 42,-8" fill="none" stroke="#A0A0A0" stroke-width="1" stroke-linecap="round"/>
    <path d="M 39,-10 Q 42,-9 41,-6" fill="none" stroke="#A0A0A0" stroke-width="1" stroke-linecap="round"/>
    <path d="M 38,-8 Q 40,-7 39,-4" fill="none" stroke="#A0A0A0" stroke-width="0.8" stroke-linecap="round"/>

    <!-- ===== HELMET ===== -->
    <!-- Helmet outer shell -->
    <circle cx="0" cy="-28" r="18" fill="#F0F0F0" stroke="#C0C0C0" stroke-width="1.2"/>
    <!-- Helmet shading -->
    <path d="M -18,-28 A 18,18 0 0,1 0,-46" fill="#E0E0E0" opacity="0.3"/>
    <!-- Helmet top highlight -->
    <ellipse cx="-4" cy="-40" rx="6" ry="3" fill="#FFFFFF" opacity="0.15"/>

    <!-- Visor outer frame -->
    <ellipse cx="0" cy="-27" rx="12" ry="11" fill="#3A7BD5" stroke="#606060" stroke-width="0.8"/>
    <!-- Visor gradient effect -->
    <ellipse cx="0" cy="-27" rx="12" ry="11" fill="url(#sky)" opacity="0.3"/>
    <!-- Visor inner highlight -->
    <ellipse cx="0" cy="-27" rx="11" ry="10" fill="#4A90D9" opacity="0.5"/>
    <!-- Visor reflection (large) -->
    <ellipse cx="-4" cy="-31" rx="5" ry="6" fill="#FFFFFF" opacity="0.15"/>
    <!-- Visor reflection (small bright) -->
    <ellipse cx="-5" cy="-33" rx="2" ry="3" fill="#FFFFFF" opacity="0.25"/>
    <!-- Visor bottom reflection -->
    <path d="M -8,-20 Q -4,-18 0,-20" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.12"/>

    <!-- Helmet rim / neck ring -->
    <path d="M -16,-16 Q 0,-12 16,-16" fill="none" stroke="#C0C0C0" stroke-width="2.5"/>
    <path d="M -16,-16 Q 0,-12 16,-16" fill="none" stroke="#D0D0D0" stroke-width="1" opacity="0.5"/>
    <!-- Neck ring bolts -->
    <circle cx="-12" cy="-15" r="0.8" fill="#A0A0A0"/>
    <circle cx="-6" cy="-14" r="0.8" fill="#A0A0A0"/>
    <circle cx="0" cy="-13" r="0.8" fill="#A0A0A0"/>
    <circle cx="6" cy="-14" r="0.8" fill="#A0A0A0"/>
    <circle cx="12" cy="-15" r="0.8" fill="#A0A0A0"/>

    <!-- Antenna base -->
    <rect x="10" y="-44" width="4" height="3" rx="0.5" fill="#A0A0A0"/>
    <!-- Antenna rod -->
    <line x1="12" y1="-44" x2="12" y2="-56" stroke="#B0B0B0" stroke-width="1.2"/>
    <!-- Antenna light -->
    <circle cx="12" cy="-58" r="3" fill="#FF4444" opacity="0.9"/>
    <circle cx="12" cy="-58" r="6" fill="#FF4444" opacity="0.15"/>
    <circle cx="12" cy="-58" r="9" fill="#FF4444" opacity="0.06"/>
    <!-- Antenna signal waves -->
    <line x1="12" y1="-58" x2="12" y2="-64" stroke="#FF4444" stroke-width="0.5" opacity="0.4"/>
    <path d="M 8,-60 Q 6,-62 8,-64" fill="none" stroke="#FF4444" stroke-width="0.4" opacity="0.3"/>
    <path d="M 16,-60 Q 18,-62 16,-64" fill="none" stroke="#FF4444" stroke-width="0.4" opacity="0.3"/>

    <!-- ===== FLOATING EFFECTS ===== -->
    <!-- Motion lines -->
    <path d="M -26,30 Q -22,28 -18,30" fill="none" stroke="#87CEEB" stroke-width="0.6" opacity="0.25"/>
    <path d="M -24,34 Q -20,32 -16,34" fill="none" stroke="#87CEEB" stroke-width="0.4" opacity="0.15"/>
    <path d="M 22,32 Q 18,30 14,32" fill="none" stroke="#87CEEB" stroke-width="0.6" opacity="0.25"/>
    <path d="M 24,36 Q 20,34 16,36" fill="none" stroke="#87CEEB" stroke-width="0.4" opacity="0.15"/>

    <!-- Floating dust/particles near astronaut -->
    <circle cx="-25" cy="15" r="0.6" fill="#87CEEB" opacity="0.2"/>
    <circle cx="28" cy="20" r="0.5" fill="#87CEEB" opacity="0.15"/>
    <circle cx="-20" cy="40" r="0.4" fill="#FFFFFF" opacity="0.1"/>
    <circle cx="25" cy="45" r="0.7" fill="#87CEEB" opacity="0.15"/>
  </g>

  <!-- Title -->
  <text x="400" y="295" text-anchor="middle" font-family="'Courier New',monospace" font-size="34" font-weight="bold" fill="#00D2FF">BRIAN ATMOKO</text>

  <!-- Subtitle -->
  <text x="400" y="328" text-anchor="middle" font-family="'Courier New',monospace" font-size="15" fill="#87CEEB" letter-spacing="3">★ DARI ANGKASA KE INTI BUMI ★</text>

  <!-- Tagline -->
  <text x="400" y="358" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#A0C0E0" opacity="0.7" letter-spacing="2">Embedded Systems  •  AI  •  Fullstack</text>

</svg>
