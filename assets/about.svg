<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" font-family="monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#2A2A3A"/>
      <rect width="38" height="38" fill="#2E2E42"/>
    </pattern>
  </defs>

  <!-- outer frame -->
  <rect x="0" y="0" width="800" height="480" fill="#1C1C28"/>
  <rect x="4" y="4" width="792" height="472" fill="#3A3A3A"/>
  <rect x="6" y="6" width="788" height="468" fill="url(#grid)"/>
  <!-- bevel highlights -->
  <rect x="2" y="2" width="796" height="476" fill="none" stroke="#5A5A5A" stroke-width="2"/>
  <rect x="8" y="8" width="784" height="464" fill="none" stroke="#8A8A8A" stroke-width="2"/>
  <line x1="10" y1="10" x2="790" y2="10" stroke="#B8B8B8" stroke-width="1"/>
  <line x1="10" y1="10" x2="10" y2="470" stroke="#B8B8B8" stroke-width="1"/>

  <!-- header: player skin icon + name -->
  <rect x="30" y="24" width="18" height="30" fill="#E0B080"/>
  <rect x="30" y="18" width="18" height="6" fill="#5E3C1B"/>
  <rect x="34" y="36" width="10" height="18" fill="#1FB6D8"/>
  <rect x="26" y="32" width="6" height="14" fill="#E6E9EE"/>
  <rect x="46" y="32" width="6" height="14" fill="#E6E9EE"/>
  <rect x="32" y="54" width="6" height="8" fill="#2E8FB8"/>
  <rect x="40" y="54" width="6" height="8" fill="#2E8FB8"/>
  <text x="60" y="38" font-size="22" font-weight="bold" fill="#FCD34D">BRIAN ATMOKO</text>
  <text x="60" y="60" font-size="11" fill="#1FB6D8">EMBEDDED &amp; FULLSTACK ENGINEER</text>

  <!-- divider -->
  <rect x="30" y="78" width="740" height="2" fill="#5A5A5A"/>

  <!-- TENTANG SAYA -->
  <rect x="30" y="96" width="14" height="14" fill="#5FB34A"/>
  <rect x="28" y="94" width="18" height="18" fill="none" stroke="#3A6E2C" stroke-width="2"/>
  <text x="52" y="108" font-size="13" font-weight="bold" fill="#5FB34A">TENTANG SAYA</text>
  <text x="30" y="130" font-size="11" fill="#B0C8E0">Merancang sistem embedded, firmware, dan perangkat lunak.</text>
  <text x="30" y="146" font-size="11" fill="#B0C8E0">Dari sensor hingga cloud, dari PCB hingga dashboard.</text>
  <text x="30" y="162" font-size="11" fill="#B0C8E0">Lebih dari 8 tahun membangun di setiap lapisan teknologi.</text>

  <!-- SPESIALISASI -->
  <rect x="30" y="186" width="14" height="14" fill="#3A6E2C"/>
  <rect x="28" y="184" width="18" height="18" fill="none" stroke="#2A4E1C" stroke-width="2"/>
  <text x="52" y="198" font-size="13" font-weight="bold" fill="#87CEEB">SPESIALISASI</text>
  <text x="30" y="218" font-size="11" fill="#A0C0E0">Drone Systems  -  Digital ECU  -  Elektronika  -  Software</text>

  <!-- BAHASA (item slots) -->
  <rect x="30" y="242" width="14" height="14" fill="#FCD34D"/>
  <rect x="28" y="240" width="18" height="18" fill="none" stroke="#B89B20" stroke-width="2"/>
  <text x="52" y="254" font-size="13" font-weight="bold" fill="#87CEEB">BAHASA FAVORIT</text>

  <rect x="30"  y="264" width="90" height="24" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="32"  y="266" width="86" height="20" fill="#00599C"/><text x="75"  y="280" text-anchor="middle" font-size="10" fill="#FFFFFF">C++</text>
  <rect x="128" y="264" width="90" height="24" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="130" y="266" width="86" height="20" fill="#ED8B00"/><text x="173" y="280" text-anchor="middle" font-size="10" fill="#FFFFFF">Java</text>
  <rect x="226" y="264" width="90" height="24" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="228" y="266" width="86" height="20" fill="#3776AB"/><text x="271" y="280" text-anchor="middle" font-size="10" fill="#FFFFFF">Python</text>

  <!-- STACK (item slots, 2 rows) -->
  <rect x="30" y="304" width="14" height="14" fill="#1FB6D8"/>
  <rect x="28" y="302" width="18" height="18" fill="none" stroke="#0F7A9E" stroke-width="2"/>
  <text x="52" y="316" font-size="13" font-weight="bold" fill="#87CEEB">STACK</text>

  <rect x="30"  y="326" width="90" height="24" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="32"  y="328" width="86" height="20" fill="#03234B"/><text x="75"  y="342" text-anchor="middle" font-size="9" fill="#FFFFFF">STM32</text>
  <rect x="128" y="326" width="90" height="24" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="130" y="328" width="86" height="20" fill="#00979D"/><text x="173" y="342" text-anchor="middle" font-size="9" fill="#FFFFFF">Arduino</text>
  <rect x="226" y="326" width="90" height="24" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="228" y="328" width="86" height="20" fill="#C51A4A"/><text x="271" y="342" text-anchor="middle" font-size="9" fill="#FFFFFF">Rasp. Pi</text>
  <rect x="30"  y="354" width="90" height="24" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="32"  y="356" width="86" height="20" fill="#41CD52"/><text x="75"  y="370" text-anchor="middle" font-size="9" fill="#FFFFFF">Qt</text>
  <rect x="128" y="354" width="90" height="24" fill="#23233A" stroke="#4A4A5A" stroke-width="2"/>
  <rect x="130" y="356" width="86" height="20" fill="#FF6F00"/><text x="173" y="370" text-anchor="middle" font-size="9" fill="#FFFFFF">TensorFlow</text>

  <!-- creeper (right side) -->
  <g>
    <rect x="560" y="240" width="130" height="130" fill="#4A8B3A"/>
    <rect x="586" y="266" width="22" height="22" fill="#1C1C28"/>
    <rect x="642" y="266" width="22" height="22" fill="#1C1C28"/>
    <rect x="598" y="304" width="12" height="12" fill="#1C1C28"/>
    <rect x="624" y="304" width="12" height="12" fill="#1C1C28"/>
    <rect x="650" y="304" width="12" height="12" fill="#1C1C28"/>
    <rect x="610" y="330" width="28" height="14" fill="#1C1C28"/>
  </g>

  <!-- XP bar (bottom) -->
  <rect x="30" y="430" width="740" height="6" fill="#2A2A3A"/>
  <rect x="30" y="430" width="480" height="6" fill="#5FB34A"/>
  <rect x="30" y="430" width="2" height="6" fill="#87CEEB" opacity="0.5"/>
  <rect x="170" y="430" width="2" height="6" fill="#87CEEB" opacity="0.5"/>
  <rect x="310" y="430" width="2" height="6" fill="#87CEEB" opacity="0.5"/>
  <rect x="450" y="430" width="2" height="6" fill="#87CEEB" opacity="0.5"/>
  <rect x="590" y="430" width="2" height="6" fill="#87CEEB" opacity="0.5"/>

  <text x="30" y="454" font-size="9" fill="#6A9EC8">HP 20  |  XP 385  |  Level 8+</text>
  <text x="630" y="454" font-size="9" fill="#6A9EC8">[data live dari GitHub]</text>
</svg>
