<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440" font-family="'Courier New', monospace">
  <!-- panel bg -->
  <rect x="0" y="0" width="800" height="440" fill="#1C1C28"/>
  <rect x="10" y="10" width="780" height="420" fill="#2A2A3A"/>
  <!-- MC UI border -->
  <rect x="4" y="4" width="792" height="432" fill="none" stroke="#8A8A8A" stroke-width="4"/>
  <rect x="9" y="9" width="782" height="422" fill="none" stroke="#B8B8B8" stroke-width="1" opacity="0.5"/>

  <!-- grass block icon -->
  <rect x="40" y="30" width="22" height="22" fill="#5FB34A"/>
  <rect x="40" y="42" width="22" height="10" fill="#8B5A2B"/>
  <text x="74" y="50" font-size="24" font-weight="bold" fill="#FCD34D">BRIAN ATMOKO</text>
  <text x="74" y="74" font-size="12" fill="#1FB6D8" letter-spacing="2">EMBEDDED &amp; FULLSTACK ENGINEER</text>

  <!-- section marker = pixel square -->
  <!-- TENTANG SAYA -->
  <rect x="40" y="104" width="12" height="12" fill="#5FB34A"/>
  <text x="60" y="115" font-size="14" font-weight="bold" fill="#5FB34A">TENTANG SAYA</text>
  <text x="40" y="138" font-size="11.5" fill="#B0C8E0">Merancang sistem embedded, firmware, dan perangkat lunak.</text>
  <text x="40" y="156" font-size="11.5" fill="#B0C8E0">Dari sensor hingga cloud, dari PCB hingga dashboard.</text>
  <text x="40" y="174" font-size="11.5" fill="#B0C8E0">Lebih dari 8 tahun membangun di setiap lapisan teknologi.</text>

  <!-- SPESIALISASI -->
  <rect x="40" y="200" width="12" height="12" fill="#4A8B3A"/>
  <text x="60" y="211" font-size="14" font-weight="bold" fill="#87CEEB">SPESIALISASI</text>
  <text x="40" y="232" font-size="11.5" fill="#A0C0E0">- Drone Systems   - Digital ECU   - Elektronika   - Software</text>

  <!-- BAHASA FAVORIT (item slots) -->
  <rect x="40" y="258" width="12" height="12" fill="#FCD34D"/>
  <text x="60" y="269" font-size="14" font-weight="bold" fill="#87CEEB">BAHASA FAVORIT</text>
  <rect x="40"  y="278" width="62" height="22" fill="#00599C" stroke="#003f6e" stroke-width="2"/><text x="71"  y="293" text-anchor="middle" font-size="10" fill="#FFFFFF">C++</text>
  <rect x="110" y="278" width="62" height="22" fill="#ED8B00" stroke="#a35f00" stroke-width="2"/><text x="141" y="293" text-anchor="middle" font-size="10" fill="#FFFFFF">Java</text>
  <rect x="180" y="278" width="72" height="22" fill="#3776AB" stroke="#264f73" stroke-width="2"/><text x="216" y="293" text-anchor="middle" font-size="10" fill="#FFFFFF">Python</text>

  <!-- STACK -->
  <rect x="40" y="314" width="12" height="12" fill="#1FB6D8"/>
  <text x="60" y="325" font-size="14" font-weight="bold" fill="#87CEEB">STACK</text>
  <rect x="40"  y="334" width="74" height="22" fill="#03234B" stroke="#021830" stroke-width="2"/><text x="77"  y="349" text-anchor="middle" font-size="9" fill="#FFFFFF">STM32</text>
  <rect x="122" y="334" width="82" height="22" fill="#00979D" stroke="#00686c" stroke-width="2"/><text x="163" y="349" text-anchor="middle" font-size="9" fill="#FFFFFF">Arduino</text>
  <rect x="212" y="334" width="96" height="22" fill="#C51A4A" stroke="#8c1234" stroke-width="2"/><text x="260" y="349" text-anchor="middle" font-size="9" fill="#FFFFFF">Raspberry Pi</text>
  <rect x="40"  y="364" width="58" height="22" fill="#41CD52" stroke="#2c8f3b" stroke-width="2"/><text x="69"  y="379" text-anchor="middle" font-size="9" fill="#FFFFFF">Qt</text>
  <rect x="106" y="364" width="96" height="22" fill="#FF6F00" stroke="#b34d00" stroke-width="2"/><text x="154" y="379" text-anchor="middle" font-size="9" fill="#FFFFFF">TensorFlow</text>

  <!-- LIVE note -->
  <text x="560" y="115" font-size="14" font-weight="bold" fill="#5FB34A">LIVE</text>
  <text x="560" y="138" font-size="11" fill="#A0C0E0">Avatar, follower,</text>
  <text x="560" y="154" font-size="11" fill="#A0C0E0">stars &amp; commit di</text>
  <text x="560" y="170" font-size="11" fill="#A0C0E0">ambil langsung dari</text>
  <text x="560" y="186" font-size="11" fill="#A0C0E0">GitHub (shields.io).</text>

  <!-- creeper face (flavor) -->
  <g>
    <rect x="600" y="300" width="120" height="120" fill="#4A8B3A"/>
    <rect x="624" y="324" width="20" height="20" fill="#1C1C28"/>
    <rect x="676" y="324" width="20" height="20" fill="#1C1C28"/>
    <rect x="636" y="360" width="12" height="12" fill="#1C1C28"/>
    <rect x="660" y="360" width="12" height="12" fill="#1C1C28"/>
    <rect x="684" y="360" width="12" height="12" fill="#1C1C28"/>
    <rect x="648" y="384" width="24" height="12" fill="#1C1C28"/>
  </g>
</svg>
