<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440" font-family="'Courier New', monospace">
  <!-- panel bg -->
  <rect x="0" y="0" width="800" height="440" fill="#1C1C28"/>
  <rect x="10" y="10" width="780" height="420" fill="#2A2A3A"/>
  <!-- MC UI border -->
  <rect x="4" y="4" width="792" height="432" fill="none" stroke="#8A8A8A" stroke-width="4"/>
  <rect x="9" y="9" width="782" height="422" fill="none" stroke="#B8B8B8" stroke-width="1" opacity="0.5"/>

  <!-- header -->
  <rect x="40" y="28" width="22" height="12" fill="#5FB34A"/>
  <rect x="40" y="40" width="22" height="10" fill="#8B5A2B"/>
  <text x="74" y="50" font-size="24" font-weight="bold" fill="#FCD34D">BRIAN ATMOKO</text>
  <text x="74" y="72" font-size="12" fill="#1FB6D8" letter-spacing="2">EMBEDDED &amp; FULLSTACK ENGINEER</text>

  <!-- TENTANG SAYA -->
  <rect x="40" y="96" width="12" height="12" fill="#5FB34A"/>
  <text x="60" y="107" font-size="14" font-weight="bold" fill="#5FB34A">TENTANG SAYA</text>
  <text x="40" y="130" font-size="11.5" fill="#B0C8E0">Merancang sistem embedded, firmware, dan perangkat lunak.</text>
  <text x="40" y="148" font-size="11.5" fill="#B0C8E0">Dari sensor hingga cloud, dari PCB hingga dashboard.</text>
  <text x="40" y="166" font-size="11.5" fill="#B0C8E0">Lebih dari 8 tahun membangun di setiap lapisan teknologi.</text>

  <!-- SPESIALISASI -->
  <rect x="40" y="192" width="12" height="12" fill="#4A8B3A"/>
  <text x="60" y="203" font-size="14" font-weight="bold" fill="#87CEEB">SPESIALISASI</text>
  <text x="40" y="224" font-size="11.5" fill="#A0C0E0">Drone Systems  -  Digital ECU  -  Elektronika  -  Software</text>

  <!-- BAHASA FAVORIT (uniform pills) -->
  <rect x="40" y="250" width="12" height="12" fill="#FCD34D"/>
  <text x="60" y="261" font-size="14" font-weight="bold" fill="#87CEEB">BAHASA FAVORIT</text>
  <rect x="40"  y="270" width="96" height="22" fill="#00599C" stroke="#003f6e" stroke-width="2"/><text x="88"  y="285" text-anchor="middle" font-size="10" fill="#FFFFFF">C++</text>
  <rect x="144" y="270" width="96" height="22" fill="#ED8B00" stroke="#a35f00" stroke-width="2"/><text x="192" y="285" text-anchor="middle" font-size="10" fill="#FFFFFF">Java</text>
  <rect x="248" y="270" width="96" height="22" fill="#3776AB" stroke="#264f73" stroke-width="2"/><text x="296" y="285" text-anchor="middle" font-size="10" fill="#FFFFFF">Python</text>

  <!-- STACK (uniform pills, 2 rows) -->
  <rect x="40" y="302" width="12" height="12" fill="#1FB6D8"/>
  <text x="60" y="313" font-size="14" font-weight="bold" fill="#87CEEB">STACK</text>
  <rect x="40"  y="322" width="104" height="22" fill="#03234B" stroke="#021830" stroke-width="2"/><text x="92"  y="337" text-anchor="middle" font-size="9"  fill="#FFFFFF">STM32</text>
  <rect x="152" y="322" width="104" height="22" fill="#00979D" stroke="#00686c" stroke-width="2"/><text x="204" y="337" text-anchor="middle" font-size="9"  fill="#FFFFFF">Arduino</text>
  <rect x="264" y="322" width="104" height="22" fill="#C51A4A" stroke="#8c1234" stroke-width="2"/><text x="316" y="337" text-anchor="middle" font-size="9"  fill="#FFFFFF">Raspberry Pi</text>
  <rect x="40"  y="350" width="104" height="22" fill="#41CD52" stroke="#2c8f3b" stroke-width="2"/><text x="92"  y="365" text-anchor="middle" font-size="9"  fill="#FFFFFF">Qt</text>
  <rect x="152" y="350" width="104" height="22" fill="#FF6F00" stroke="#b34d00" stroke-width="2"/><text x="204" y="365" text-anchor="middle" font-size="9"  fill="#FFFFFF">TensorFlow</text>

  <!-- creeper face (flavor) -->
  <g>
    <rect x="560" y="250" width="120" height="120" fill="#4A8B3A"/>
    <rect x="584" y="274" width="20" height="20" fill="#1C1C28"/>
    <rect x="636" y="274" width="20" height="20" fill="#1C1C28"/>
    <rect x="596" y="310" width="12" height="12" fill="#1C1C28"/>
    <rect x="620" y="310" width="12" height="12" fill="#1C1C28"/>
    <rect x="644" y="310" width="12" height="12" fill="#1C1C28"/>
    <rect x="608" y="334" width="24" height="12" fill="#1C1C28"/>
  </g>
</svg>
