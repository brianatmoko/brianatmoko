<svg width="800" height="140" viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="atmos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2466"/>
      <stop offset="35%" stop-color="#3A5A9A"/>
      <stop offset="65%" stop-color="#6A9EC8"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>

  <rect width="800" height="140" fill="url(#atmos)"/>

  <!-- Stars fading out at top -->
  <g fill="#FFFFFF" opacity="0.6">
    <circle cx="50" cy="10" r="1.2"/>
    <circle cx="150" cy="18" r="0.8"/>
    <circle cx="300" cy="8" r="1"/>
    <circle cx="450" cy="15" r="0.7"/>
    <circle cx="600" cy="12" r="1.1"/>
    <circle cx="750" cy="8" r="0.9"/>
  </g>

  <g fill="#FFFFFF" opacity="0.3">
    <circle cx="100" cy="25" r="0.6"/>
    <circle cx="250" cy="30" r="0.5"/>
    <circle cx="500" cy="22" r="0.7"/>
    <circle cx="700" cy="28" r="0.5"/>
  </g>

  <!-- Distant thin clouds (high altitude) -->
  <g fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.12">
    <path d="M 0,40 Q 40,35 80,38 Q 120,33 160,37 Q 200,32 240,36"/>
    <path d="M 300,42 Q 340,37 380,40 Q 420,35 460,39 Q 500,34 540,38"/>
    <path d="M 600,38 Q 640,33 680,36 Q 720,31 760,35 Q 800,32 800,35"/>
  </g>

  <!-- Cloud layer 1 (mid) -->
  <g fill="#FFFFFF" opacity="0.08">
    <ellipse cx="60" cy="58" rx="80" ry="12"/>
    <ellipse cx="200" cy="62" rx="100" ry="14"/>
    <ellipse cx="400" cy="55" rx="120" ry="16"/>
    <ellipse cx="600" cy="60" rx="90" ry="12"/>
    <ellipse cx="740" cy="56" rx="70" ry="10"/>
  </g>

  <!-- Cloud layer 2 (lower, more visible) -->
  <g fill="#FFFFFF" opacity="0.15">
    <ellipse cx="100" cy="80" rx="90" ry="15"/>
    <ellipse cx="300" cy="85" rx="110" ry="18"/>
    <ellipse cx="500" cy="78" rx="130" ry="17"/>
    <ellipse cx="700" cy="82" rx="80" ry="14"/>
  </g>

  <!-- Cloud layer 3 (bottom, thick) -->
  <g fill="#FFFFFF" opacity="0.2">
    <ellipse cx="50" cy="105" rx="100" ry="20"/>
    <ellipse cx="250" cy="110" rx="140" ry="22"/>
    <ellipse cx="500" cy="108" rx="150" ry="24"/>
    <ellipse cx="700" cy="112" rx="120" ry="20"/>
    <ellipse cx="800" cy="105" rx="80" ry="18"/>
  </g>

  <!-- Cloud highlights -->
  <g fill="#FFFFFF" opacity="0.08">
    <ellipse cx="180" cy="100" rx="60" ry="8"/>
    <ellipse cx="420" cy="98" rx="70" ry="10"/>
    <ellipse cx="650" cy="102" rx="50" ry="7"/>
  </g>

  <!-- Light rays from top -->
  <g fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.04">
    <line x1="400" y1="0" x2="350" y2="140"/>
    <line x1="400" y1="0" x2="400" y2="140"/>
    <line x1="400" y1="0" x2="450" y2="140"/>
    <line x1="420" y1="0" x2="500" y2="140"/>
    <line x1="380" y1="0" x2="300" y2="140"/>
  </g>

  <!-- Small atmospheric particles -->
  <g fill="#FFFFFF" opacity="0.06">
    <circle cx="120" cy="90" r="1"/>
    <circle cx="280" cy="75" r="0.8"/>
    <circle cx="450" cy="95" r="1.2"/>
    <circle cx="620" cy="70" r="0.7"/>
    <circle cx="750" cy="88" r="0.9"/>
    <circle cx="50" cy="95" r="0.6"/>
    <circle cx="380" cy="65" r="0.8"/>
    <circle cx="550" cy="100" r="1"/>
  </g>

  <!-- Glow at bottom (sunlight scattering) -->
  <ellipse cx="400" cy="140" rx="300" ry="30" fill="#FFFFFF" opacity="0.06"/>
</svg>
