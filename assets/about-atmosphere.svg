<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2466"/>
      <stop offset="35%" stop-color="#3A5A9A"/>
      <stop offset="65%" stop-color="#6A9EC8"/>
      <stop offset="100%" stop-color="#A0D8EF"/>
    </linearGradient>
    <linearGradient id="islandGrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BBC5B"/>
      <stop offset="15%" stop-color="#6BA33A"/>
      <stop offset="25%" stop-color="#8B6B3D"/>
      <stop offset="100%" stop-color="#5A3D1A"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F193C" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0A122D" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cardAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="50%" stop-color="#0088CC"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
  </defs>

  <!-- SKY -->
  <rect width="800" height="400" fill="url(#skyGrad)"/>

  <!-- SUNRISE GLOW -->
  <ellipse cx="400" cy="40" rx="200" ry="60" fill="#FFFFFF" opacity="0.06"/>
  <ellipse cx="400" cy="40" rx="120" ry="30" fill="#FFE87C" opacity="0.04"/>

  <!-- HIGH CLOUDS -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.12">
    <path d="M -10,50 Q 30,44 80,48 Q 130,42 180,46 Q 230,40 280,44 Q 330,38 380,42"/>
    <path d="M 300,60 Q 350,54 400,58 Q 450,52 500,56 Q 550,50 600,54 Q 650,48 700,52"/>
    <path d="M 500,45 Q 550,39 600,43 Q 650,37 700,41 Q 750,35 810,39"/>
  </g>

  <!-- MID CLOUDS -->
  <g fill="#FFFFFF">
    <ellipse cx="120" cy="100" rx="130" ry="18" opacity="0.08"/>
    <ellipse cx="400" cy="95" rx="160" ry="20" opacity="0.1"/>
    <ellipse cx="680" cy="105" rx="120" ry="16" opacity="0.08"/>
  </g>

  <!-- LOW CLOUDS (behind island) -->
  <g fill="#FFFFFF">
    <ellipse cx="160" cy="165" rx="140" ry="22" opacity="0.15"/>
    <ellipse cx="640" cy="170" rx="150" ry="20" opacity="0.13"/>
  </g>

  <!-- CLOUDS BELOW ISLAND -->
  <g fill="#FFFFFF">
    <ellipse cx="80" cy="260" rx="140" ry="20" opacity="0.2"/>
    <ellipse cx="300" cy="270" rx="120" ry="16" opacity="0.15"/>
    <ellipse cx="550" cy="265" rx="150" ry="22" opacity="0.18"/>
    <ellipse cx="750" cy="255" rx="110" ry="14" opacity="0.15"/>
    <ellipse cx="200" cy="290" rx="100" ry="10" opacity="0.1"/>
    <ellipse cx="600" cy="285" rx="120" ry="12" opacity="0.12"/>
  </g>

  <!-- FLOATING ISLAND -->
  <g transform="translate(400, 310)">
    <!-- Island body (dirt + stone cone) -->
    <path d="M -90,-15 Q -100,20 -85,55 Q -70,85 -40,100 Q -10,110 20,105 Q 60,95 85,70 Q 105,40 95,0 Q 90,-10 80,-15 Z" fill="url(#islandGrass)"/>

    <!-- Dirt texture bands -->
    <path d="M -80,15 Q -40,20 0,18 Q 40,15 80,20" fill="none" stroke="#6B4F2A" stroke-width="1.5" opacity="0.3"/>
    <path d="M -75,30 Q -35,35 5,32 Q 45,28 75,33" fill="none" stroke="#6B4F2A" stroke-width="1.5" opacity="0.3"/>
    <path d="M -65,48 Q -25,52 15,48 Q 55,44 65,50" fill="none" stroke="#6B4F2A" stroke-width="1.5" opacity="0.25"/>
    <path d="M -50,65 Q -15,68 20,65 Q 50,62 55,67" fill="none" stroke="#6B4F2A" stroke-width="1.5" opacity="0.2"/>

    <!-- Stone details -->
    <rect x="-30" y="40" width="8" height="6" rx="1" fill="#808080" opacity="0.25"/>
    <rect x="25" y="55" width="10" height="7" rx="1" fill="#808080" opacity="0.2"/>
    <rect x="-50" y="58" width="6" height="5" rx="1" fill="#808080" opacity="0.2"/>
    <rect x="50" y="42" width="7" height="5" rx="1" fill="#808080" opacity="0.15"/>

    <!-- Hanging vines -->
    <path d="M -60,75 Q -63,95 -57,110" fill="none" stroke="#4A7A22" stroke-width="1.5" opacity="0.4"/>
    <path d="M -25,98 Q -28,115 -22,128" fill="none" stroke="#4A7A22" stroke-width="1.5" opacity="0.4"/>
    <path d="M 15,100 Q 12,118 18,130" fill="none" stroke="#4A7A22" stroke-width="1.5" opacity="0.35"/>
    <path d="M 55,85 Q 52,102 58,115" fill="none" stroke="#4A7A22" stroke-width="1.5" opacity="0.4"/>
    <path d="M 75,65 Q 73,80 77,92" fill="none" stroke="#4A7A22" stroke-width="1" opacity="0.3"/>
    <!-- Vine leaves -->
    <ellipse cx="-59" cy="100" rx="3" ry="2" fill="#5B8C2A" opacity="0.4"/>
    <ellipse cx="-24" cy="116" rx="3" ry="2" fill="#5B8C2A" opacity="0.35"/>
    <ellipse cx="17" cy="118" rx="3" ry="2" fill="#5B8C2A" opacity="0.35"/>
    <ellipse cx="57" cy="105" rx="3" ry="2" fill="#5B8C2A" opacity="0.4"/>

    <!-- Grass surface -->
    <ellipse cx="0" cy="-15" rx="95" ry="18" fill="#7BBC5B"/>
    <ellipse cx="0" cy="-15" rx="95" ry="18" fill="none" stroke="#6BA33A" stroke-width="1"/>

    <!-- Grass blades -->
    <line x1="-70" y1="-18" x2="-72" y2="-28" stroke="#6BA33A" stroke-width="1.2" opacity="0.5"/>
    <line x1="-50" y1="-20" x2="-52" y2="-30" stroke="#6BA33A" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-22" x2="-32" y2="-32" stroke="#6BA33A" stroke-width="1.2" opacity="0.5"/>
    <line x1="-10" y1="-23" x2="-12" y2="-33" stroke="#6BA33A" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="-23" x2="8" y2="-33" stroke="#6BA33A" stroke-width="1.2" opacity="0.5"/>
    <line x1="30" y1="-22" x2="28" y2="-32" stroke="#6BA33A" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="-20" x2="48" y2="-30" stroke="#6BA33A" stroke-width="1.2" opacity="0.5"/>
    <line x1="70" y1="-18" x2="68" y2="-28" stroke="#6BA33A" stroke-width="1" opacity="0.5"/>

    <!-- Flowers -->
    <circle cx="-60" cy="-20" r="2.5" fill="#FF6B6B" opacity="0.6"/>
    <circle cx="-60" cy="-20" r="1.2" fill="#FFD700" opacity="0.4"/>
    <circle cx="55" cy="-19" r="2.5" fill="#FFD700" opacity="0.6"/>
    <circle cx="55" cy="-19" r="1.2" fill="#FF8C00" opacity="0.4"/>
    <circle cx="-15" cy="-24" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="35" cy="-22" r="2" fill="#FF6B6B" opacity="0.5"/>
  </g>

  <!-- PROFILE CARD -->
  <g transform="translate(400, 160)">
    <!-- Card background -->
    <rect x="-240" y="-60" width="480" height="200" rx="14" fill="url(#cardBg)"/>
    <rect x="-240" y="-60" width="480" height="200" rx="14" fill="none" stroke="#3A5A9A" stroke-width="1.2"/>

    <!-- Top accent glow -->
    <rect x="-240" y="-60" width="480" height="3" rx="1.5" fill="url(#cardAccent)" opacity="0.8"/>

    <!-- Avatar placeholder (circular) -->
    <circle cx="205" cy="-20" r="24" fill="#1E2466" stroke="#2D4A7A" stroke-width="1.5"/>
    <circle cx="205" cy="-20" r="24" fill="none" stroke="#00D2FF" stroke-width="0.5" opacity="0.3"/>
    <!-- Simple silhouette -->
    <circle cx="205" cy="-28" r="8" fill="#A0C0E0" opacity="0.6"/>
    <ellipse cx="205" cy="-12" rx="12" ry="8" fill="#A0C0E0" opacity="0.4"/>

    <!-- Name -->
    <text x="-220" y="-28" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#00D2FF" letter-spacing="1">Brian Atmoko</text>

    <!-- Role -->
    <text x="-220" y="-8" font-family="'Courier New',monospace" font-size="11" fill="#87CEEB">Embedded Systems &amp; Fullstack Engineer</text>

    <!-- Location -->
    <text x="-220" y="6" font-family="'Courier New',monospace" font-size="9" fill="#6A9EC8" opacity="0.6">Indonesia</text>

    <!-- Experience tag -->
    <rect x="-220" y="15" width="90" height="18" rx="9" fill="#0055AA" opacity="0.3"/>
    <rect x="-220" y="15" width="90" height="18" rx="9" fill="none" stroke="#00D2FF" stroke-width="0.5" opacity="0.3"/>
    <text x="-175" y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#00D2FF" opacity="0.8">8+ Tahun Pengalaman</text>

    <!-- Separator -->
    <line x1="-220" y1="42" x2="220" y2="42" stroke="#2D4A7A" stroke-width="0.8"/>

    <!-- Description line 1 -->
    <text x="-220" y="58" font-family="'Courier New',monospace" font-size="9.5" fill="#B0C8E0">
      Merancang sistem embedded, firmware, dan perangkat lunak
    </text>

    <!-- Description line 2 -->
    <text x="-220" y="73" font-family="'Courier New',monospace" font-size="9.5" fill="#B0C8E0">
      dari sensor hingga cloud, dari PCB hingga dashboard.
    </text>

    <!-- Specializations label -->
    <text x="-220" y="92" font-family="'Courier New',monospace" font-size="10" font-weight="bold" fill="#87CEEB">Spesialisasi</text>

    <!-- Spec items -->
    <g font-family="'Courier New',monospace" font-size="9">
      <text x="-215" y="107" fill="#A0C0E0">Drone Systems</text>
      <text x="-110" y="107" fill="#6A9EC8" opacity="0.7">Flight controller, GCS, autonomous nav</text>
      <text x="-215" y="122" fill="#A0C0E0">Digital ECU</text>
      <text x="-110" y="122" fill="#6A9EC8" opacity="0.7">Engine control, CAN bus, sensor fusion</text>
      <text x="-215" y="137" fill="#A0C0E0">Elektronika</text>
      <text x="-110" y="137" fill="#6A9EC8" opacity="0.7">PCB design, power electronics, signal proc.</text>
    </g>

    <!-- Language badges -->
    <g transform="translate(-220, 150)">
      <rect x="0" y="-7" width="34" height="18" rx="4" fill="#00599C"/>
      <text x="17" y="5" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#FFFFFF">C++</text>

      <rect x="40" y="-7" width="34" height="18" rx="4" fill="#B3470A"/>
      <text x="57" y="5" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#FFFFFF">Java</text>

      <rect x="80" y="-7" width="38" height="18" rx="4" fill="#306998"/>
      <text x="99" y="5" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#FFFFFF">Python</text>
    </g>

    <!-- Quote -->
    <text x="0" y="175" text-anchor="middle" font-family="'Courier New',monospace" font-size="8.5" fill="#6A9EC8" opacity="0.4" font-style="italic">"Dari hardware ke cloud, bangun di setiap lapisan."</text>
  </g>

  <!-- LIGHT RAYS -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.03">
    <line x1="120" y1="0" x2="-20" y2="400"/>
    <line x1="180" y1="0" x2="80" y2="400"/>
    <line x1="240" y1="0" x2="180" y2="400"/>
    <line x1="300" y1="0" x2="280" y2="400"/>
    <line x1="360" y1="0" x2="380" y2="400"/>
  </g>
</svg>
