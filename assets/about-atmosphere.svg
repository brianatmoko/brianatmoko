<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D4A7A"/>
      <stop offset="30%" stop-color="#4A7AB5"/>
      <stop offset="60%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B0D8F0"/>
    </linearGradient>
    <linearGradient id="islandDirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BBC5B"/>
      <stop offset="15%" stop-color="#6BA33A"/>
      <stop offset="20%" stop-color="#8B6B3D"/>
      <stop offset="100%" stop-color="#6B4F2A"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(15,25,60,0.7)"/>
      <stop offset="100%" stop-color="rgba(10,18,45,0.85)"/>
    </linearGradient>
    <linearGradient id="sunGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#FFE87C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="150" y="100" width="500" height="200" rx="12"/>
    </clipPath>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="420" fill="url(#skyGrad)"/>

  <!-- Sun glow -->
  <ellipse cx="400" cy="0" rx="350" ry="120" fill="url(#sunGlow)"/>

  <!-- Distant thin clouds -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15">
    <path d="M -20,50 Q 30,44 80,48 Q 130,42 180,46 Q 230,40 280,44"/>
    <path d="M 350,55 Q 400,49 450,53 Q 500,47 550,51 Q 600,45 650,49"/>
    <path d="M 500,45 Q 550,39 600,43 Q 650,37 700,41 Q 750,35 820,39"/>
  </g>

  <!-- Cloud layer 1 (upper) -->
  <g fill="#FFFFFF" opacity="0.1">
    <ellipse cx="100" cy="70" rx="120" ry="14"/>
    <ellipse cx="400" cy="65" rx="150" ry="16"/>
    <ellipse cx="700" cy="72" rx="110" ry="12"/>
  </g>

  <!-- Cloud layer 2 -->
  <g fill="#FFFFFF" opacity="0.15">
    <ellipse cx="150" cy="100" rx="100" ry="12"/>
    <ellipse cx="500" cy="105" rx="130" ry="14"/>
    <ellipse cx="750" cy="98" rx="90" ry="10"/>
  </g>

  <!-- Cloud layer 3 (behind island) -->
  <g fill="#FFFFFF" opacity="0.2">
    <ellipse cx="200" cy="140" rx="140" ry="18"/>
    <ellipse cx="600" cy="145" rx="160" ry="20"/>
  </g>

  <!-- Clouds below the island -->
  <g fill="#FFFFFF" opacity="0.3">
    <ellipse cx="100" cy="200" rx="130" ry="16"/>
    <ellipse cx="350" cy="210" rx="120" ry="14"/>
    <ellipse cx="600" cy="205" rx="140" ry="18"/>
    <ellipse cx="780" cy="195" rx="100" ry="12"/>
  </g>

  <g fill="#FFFFFF" opacity="0.18">
    <ellipse cx="250" cy="225" rx="100" ry="10"/>
    <ellipse cx="550" cy="220" rx="110" ry="12"/>
  </g>

  <!-- Floating Island -->
  <g transform="translate(110, 250)">
    <!-- Island bottom (dirt + stone) -->
    <path d="M 0,20 Q -10,10 -15,0 Q -30,40 -25,70 Q -20,90 -10,100 Q 0,110 20,115 Q 50,120 80,115 Q 110,105 120,90 Q 130,70 125,50 Q 120,30 110,20 Q 100,5 90,0 Z" fill="url(#islandDirt)"/>

    <!-- Dirt texture lines -->
    <g stroke="#7A5D32" stroke-width="0.8" opacity="0.4" fill="none">
      <path d="M -20,40 Q 0,45 20,42"/>
      <path d="M -15,55 Q 10,58 35,53"/>
      <path d="M -5,70 Q 20,73 50,68"/>
      <path d="M 10,85 Q 40,88 70,83"/>
      <path d="M 30,98 Q 55,101 80,96"/>
    </g>

    <!-- Stone spots -->
    <g fill="#909090" opacity="0.3">
      <circle cx="-5" cy="65" r="4"/>
      <circle cx="35" cy="80" r="5"/>
      <circle cx="70" cy="72" r="3.5"/>
      <circle cx="15" cy="95" r="4.5"/>
      <circle cx="90" cy="55" r="3"/>
    </g>

    <!-- Hanging vines -->
    <g fill="#4A7A22" opacity="0.5">
      <path d="M -10,100 Q -12,115 -8,130" stroke="#4A7A22" stroke-width="1.5" fill="none"/>
      <path d="M 30,115 Q 28,130 32,145" stroke="#4A7A22" stroke-width="1.5" fill="none"/>
      <path d="M 70,112 Q 68,125 72,138" stroke="#4A7A22" stroke-width="1.5" fill="none"/>
      <path d="M 100,95 Q 98,108 102,120" stroke="#4A7A22" stroke-width="1.5" fill="none"/>
      <!-- Small leaves on vines -->
      <ellipse cx="-7" cy="118" rx="2" ry="1.5" fill="#5B8C2A"/>
      <ellipse cx="33" cy="133" rx="2" ry="1.5" fill="#5B8C2A"/>
      <ellipse cx="71" cy="126" rx="2" ry="1.5" fill="#5B8C2A"/>
    </g>

    <!-- Island top (grass surface) -->
    <ellipse cx="55" cy="0" rx="75" ry="12" fill="#7BBC5B"/>
    <ellipse cx="55" cy="0" rx="75" ry="12" fill="none" stroke="#6BA33A" stroke-width="1"/>

    <!-- Grass blades -->
    <g stroke="#6BA33A" stroke-width="1" opacity="0.6" fill="none">
      <line x1="10" y1="-2" x2="8" y2="-8"/>
      <line x1="20" y1="-3" x2="18" y2="-10"/>
      <line x1="30" y1="-2" x2="32" y2="-9"/>
      <line x1="45" y1="-1" x2="43" y2="-7"/>
      <line x1="60" y1="-2" x2="62" y2="-8"/>
      <line x1="75" y1="-3" x2="73" y2="-10"/>
      <line x1="85" y1="-2" x2="87" y2="-7"/>
      <line x1="95" y1="-1" x2="93" y2="-8"/>
    </g>

    <!-- Small flowers -->
    <g>
      <circle cx="15" cy="-4" r="2" fill="#FF6B6B" opacity="0.7"/>
      <circle cx="15" cy="-4" r="1" fill="#FFD700" opacity="0.5"/>
      <circle cx="80" cy="-3" r="2" fill="#FFD700" opacity="0.7"/>
      <circle cx="80" cy="-3" r="1" fill="#FF8C00" opacity="0.5"/>
      <circle cx="45" cy="-5" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    </g>
  </g>

  <!-- Profile Card -->
  <g transform="translate(400, 190)" filter="url(#cardShadow)">
    <!-- Card background -->
    <rect x="-230" y="-70" width="460" height="200" rx="12" fill="url(#cardBg)"/>
    <rect x="-230" y="-70" width="460" height="200" rx="12" fill="none" stroke="#6A9EC8" stroke-width="1" opacity="0.4"/>

    <!-- Card top accent line -->
    <rect x="-230" y="-70" width="460" height="3" rx="1.5" fill="#00D2FF" opacity="0.6"/>

    <!-- Profile icon (small astronaut helmet icon) -->
    <g transform="translate(-190, -40)">
      <circle cx="0" cy="0" r="14" fill="#E8E8E8" stroke="#A0A0A0" stroke-width="1.2"/>
      <ellipse cx="0" cy="1" rx="9" ry="8" fill="#4A90D9" stroke="#808080" stroke-width="0.6"/>
      <ellipse cx="-2" cy="-1" rx="3" ry="3.5" fill="#FFFFFF" opacity="0.2"/>
    </g>

    <!-- Name -->
    <text x="-160" y="-35" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#00D2FF">Brian Atmoko</text>

    <!-- Title -->
    <text x="-160" y="-15" font-family="'Courier New',monospace" font-size="11" fill="#A0C0E0" opacity="0.8">Embedded Systems &amp; Fullstack Engineer</text>

    <!-- Location -->
    <text x="-160" y="0" font-family="'Courier New',monospace" font-size="10" fill="#87CEEB" opacity="0.5">Indonesia</text>

    <!-- Separator line -->
    <line x1="-190" y1="12" x2="190" y2="12" stroke="#2D4A7A" stroke-width="0.8"/>

    <!-- Description -->
    <text x="-190" y="32" font-family="'Courier New',monospace" font-size="9.5" fill="#B0C8E0">
      8+ tahun merancang sistem embedded, firmware, dan
    </text>
    <text x="-190" y="48" font-family="'Courier New',monospace" font-size="9.5" fill="#B0C8E0">
      perangkat lunak. Dari sensor ke cloud, PCB ke dashboard.
    </text>

    <!-- Specializations -->
    <text x="-190" y="68" font-family="'Courier New',monospace" font-size="10" font-weight="bold" fill="#87CEEB">Spesialisasi:</text>

    <text x="-185" y="84" font-family="'Courier New',monospace" font-size="9" fill="#A0C0E0">Drone Systems</text>
    <text x="-100" y="84" font-family="'Courier New',monospace" font-size="9" fill="#6A9EC8">Flight controller, GCS, navigasi otonom</text>

    <text x="-185" y="99" font-family="'Courier New',monospace" font-size="9" fill="#A0C0E0">Digital ECU</text>
    <text x="-100" y="99" font-family="'Courier New',monospace" font-size="9" fill="#6A9EC8">Engine control, CAN bus, sensor fusion</text>

    <text x="-185" y="114" font-family="'Courier New',monospace" font-size="9" fill="#A0C0E0">Elektronika</text>
    <text x="-100" y="114" font-family="'Courier New',monospace" font-size="9" fill="#6A9EC8">PCB design, power electronics, signal proc.</text>

    <text x="-185" y="129" font-family="'Courier New',monospace" font-size="9" fill="#A0C0E0">Software</text>
    <text x="-100" y="129" font-family="'Courier New',monospace" font-size="9" fill="#6A9EC8">Desktop, mobile, API, microservices</text>

    <!-- Favorite languages badges -->
    <g transform="translate(-190, 145)">
      <rect x="0" y="-5" width="30" height="16" rx="3" fill="#00599C" opacity="0.8"/>
      <text x="15" y="6" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#FFFFFF">C++</text>

      <rect x="35" y="-5" width="30" height="16" rx="3" fill="#ED8B00" opacity="0.8"/>
      <text x="50" y="6" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#FFFFFF">Java</text>

      <rect x="70" y="-5" width="30" height="16" rx="3" fill="#3776AB" opacity="0.8"/>
      <text x="85" y="6" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#FFFFFF">Python</text>
    </g>

    <!-- Bottom accent line -->
    <rect x="-230" y="127" width="460" height="1" opacity="0.15" fill="#6A9EC8"/>

    <!-- Quote -->
    <text x="400" y="175" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6A9EC8" opacity="0.5" font-style="italic">"Dari hardware ke cloud, bangun di setiap lapisan."</text>
  </g>

  <!-- Foreground clouds (passing in front of island edges) -->
  <g fill="#FFFFFF" opacity="0.18">
    <ellipse cx="-20" cy="180" rx="80" ry="10"/>
    <ellipse cx="820" cy="185" rx="70" ry="8"/>
  </g>

  <!-- Small floating particles -->
  <g fill="#FFFFFF" opacity="0.15">
    <circle cx="50" cy="180" r="1"/>
    <circle cx="180" cy="160" r="0.8"/>
    <circle cx="320" cy="190" r="1.2"/>
    <circle cx="500" cy="165" r="0.7"/>
    <circle cx="650" cy="185" r="0.9"/>
    <circle cx="750" cy="170" r="1.1"/>
    <circle cx="280" cy="145" r="0.6"/>
    <circle cx="580" cy="155" r="0.8"/>
  </g>

  <!-- Light rays from upper left -->
  <g stroke="#FFFFFF" stroke-width="0.6" opacity="0.04">
    <line x1="100" y1="0" x2="-50" y2="420"/>
    <line x1="150" y1="0" x2="50" y2="420"/>
    <line x1="200" y1="0" x2="150" y2="420"/>
    <line x1="250" y1="0" x2="250" y2="420"/>
  </g>
</svg>
