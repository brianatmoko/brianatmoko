<svg width="800" height="380" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2466"/>
      <stop offset="45%" stop-color="#3A5A9A"/>
      <stop offset="100%" stop-color="#6A9EC8"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1228" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#080E20" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#008CCC"/>
    </linearGradient>
  </defs>

  <!-- SKY -->
  <rect width="800" height="380" fill="url(#skyGrad)"/>

  <!-- SOFT SUN BEAM -->
  <ellipse cx="400" cy="-20" rx="280" ry="90" fill="#FFFFFF" opacity="0.05"/>

  <!-- THIN HIGH CLOUDS -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.1" stroke-linecap="round">
    <path d="M -10,45 Q 40,39 90,43 Q 140,37 190,41 Q 240,35 290,39"/>
    <path d="M 340,50 Q 390,44 440,48 Q 490,42 540,46 Q 590,40 640,44"/>
    <path d="M 520,38 Q 570,32 620,36 Q 670,30 720,34 Q 770,28 820,32"/>
  </g>

  <!-- MID CLOUDS -->
  <g fill="#FFFFFF">
    <ellipse cx="120" cy="90" rx="140" ry="15" opacity="0.08"/>
    <ellipse cx="420" cy="85" rx="170" ry="17" opacity="0.1"/>
    <ellipse cx="720" cy="92" rx="130" ry="13" opacity="0.08"/>
  </g>

  <!-- LOWER CLOUDS -->
  <g fill="#FFFFFF">
    <ellipse cx="200" cy="300" rx="150" ry="20" opacity="0.14"/>
    <ellipse cx="600" cy="305" rx="160" ry="22" opacity="0.12"/>
    <ellipse cx="430" cy="330" rx="200" ry="25" opacity="0.1"/>
  </g>

  <!-- PROFILE CARD -->
  <g transform="translate(400,180)">
    <!-- Card shadow -->
    <rect x="-245" y="-75" width="490" height="245" rx="16" fill="#000000" opacity="0.25"/>

    <!-- Card body -->
    <rect x="-250" y="-80" width="500" height="250" rx="16" fill="url(#cardGrad)"/>
    <rect x="-250" y="-80" width="500" height="250" rx="16" fill="none" stroke="#2D4A7A" stroke-width="1.5"/>

    <!-- Top accent bar -->
    <rect x="-250" y="-80" width="500" height="4" rx="2" fill="url(#accentGrad)"/>

    <!-- AVATAR -->
    <g transform="translate(-195,-20)">
      <circle cx="0" cy="0" r="28" fill="#1E2466" stroke="#00D2FF" stroke-width="1.5" opacity="0.9"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#00D2FF" stroke-width="0.5" opacity="0.2"/>
      <!-- Helmet silhouette -->
      <circle cx="0" cy="-4" r="10" fill="#E8E8E8"/>
      <ellipse cx="0" cy="-3" rx="6.5" ry="6" fill="#4A90D9"/>
      <ellipse cx="-2" cy="-5" rx="2.5" ry="3" fill="#FFFFFF" opacity="0.2"/>
      <ellipse cx="0" cy="12" rx="14" ry="9" fill="#E8E8E8" opacity="0.8"/>
    </g>

    <!-- NAME -->
    <text x="-155" y="-38" font-family="'Courier New',monospace" font-size="26" font-weight="bold" fill="#00D2FF" letter-spacing="1">Brian Atmoko</text>

    <!-- ROLE -->
    <text x="-155" y="-16" font-family="'Courier New',monospace" font-size="12" fill="#87CEEB">Embedded Systems &amp; Fullstack Engineer</text>

    <!-- LOCATION TAG -->
    <g transform="translate(-155,0)">
      <rect x="0" y="-8" width="62" height="16" rx="8" fill="#0055AA" opacity="0.35"/>
      <circle cx="8" cy="0" r="2" fill="#00D2FF" opacity="0.7"/>
      <text x="14" y="4" font-family="'Courier New',monospace" font-size="8" fill="#A0C0E0" opacity="0.8">Indonesia</text>
    </g>

    <!-- EXPERIENCE TAG -->
    <g transform="translate(-85,0)">
      <rect x="0" y="-8" width="76" height="16" rx="8" fill="#0055AA" opacity="0.35"/>
      <text x="38" y="4" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#00D2FF" opacity="0.8">8+ Tahun</text>
    </g>

    <!-- DIVIDER -->
    <line x1="-225" y1="22" x2="225" y2="22" stroke="#2D4A7A" stroke-width="1" opacity="0.5"/>

    <!-- BIO -->
    <text x="-225" y="40" font-family="'Courier New',monospace" font-size="9.5" fill="#B0C8E0">
      Merancang sistem embedded, firmware, dan perangkat lunak
    </text>
    <text x="-225" y="54" font-family="'Courier New',monospace" font-size="9.5" fill="#B0C8E0">
      dari sensor hingga cloud, dari PCB hingga dashboard.
    </text>

    <!-- SECTION LABEL -->
    <text x="-225" y="76" font-family="'Courier New',monospace" font-size="10" font-weight="bold" fill="#87CEEB">Spesialisasi</text>

    <!-- SPECS -->
    <g font-family="'Courier New',monospace" font-size="9">
      <text x="-220" y="92" fill="#A0C0E0">Drone Systems</text>
      <text x="-95" y="92" fill="#6A9EC8" opacity="0.75">Flight controller, GCS, autonomous nav</text>

      <text x="-220" y="106" fill="#A0C0E0">Digital ECU</text>
      <text x="-95" y="106" fill="#6A9EC8" opacity="0.75">Engine control, CAN bus, sensor fusion</text>

      <text x="-220" y="120" fill="#A0C0E0">Elektronika</text>
      <text x="-95" y="120" fill="#6A9EC8" opacity="0.75">PCB design, power electronics, signal proc.</text>

      <text x="-220" y="134" fill="#A0C0E0">Software</text>
      <text x="-95" y="134" fill="#6A9EC8" opacity="0.75">Desktop, mobile, API, microservices</text>
    </g>

    <!-- LANGUAGE BADGES -->
    <g transform="translate(-225,152)">
      <rect x="0" y="0" width="36" height="18" rx="4" fill="#00599C"/>
      <text x="18" y="12" text-anchor="middle" font-family="'Courier New',monospace" font-size="8.5" font-weight="bold" fill="#FFFFFF">C++</text>

      <rect x="44" y="0" width="36" height="18" rx="4" fill="#B3470A"/>
      <text x="62" y="12" text-anchor="middle" font-family="'Courier New',monospace" font-size="8.5" font-weight="bold" fill="#FFFFFF">Java</text>

      <rect x="88" y="0" width="40" height="18" rx="4" fill="#306998"/>
      <text x="108" y="12" text-anchor="middle" font-family="'Courier New',monospace" font-size="8.5" font-weight="bold" fill="#FFFFFF">Python</text>
    </g>

    <!-- QUOTE -->
    <text x="0" y="170" text-anchor="middle" font-family="'Courier New',monospace" font-size="8.5" fill="#6A9EC8" opacity="0.45" font-style="italic">"Dari hardware ke cloud, bangun di setiap lapisan."</text>
  </g>

  <!-- FOREGROUND CLOUDS (subtle) -->
  <g fill="#FFFFFF" opacity="0.08">
    <ellipse cx="60" cy="350" rx="120" ry="14"/>
    <ellipse cx="760" cy="345" rx="100" ry="10"/>
  </g>
</svg>
